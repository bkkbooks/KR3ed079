body:
  text: 卷二和解之劑小柴胡湯柴胡八兩半夏半升人參甘草黃芩生薑三兩大棗十二枚少陽為半表半裡之經邪在表者可汗邪在裡者不可汗也邪在表者可吐邪在裡者不可吐也邪在裡者可下邪在表者不可下也須知此之所謂半表半裡者乃在陰陽交界之所陽經將盡駸駸乎欲入太陰營衛不和陰陽交戰並非謂表裡受邪若大柴胡可表可下例也仲景嘉惠後世獨開和解一門俾後人有所持循不犯禁忌蓋和者和其里也解者解其表也和其里則邪不得內犯陰經解其表則邪仍從陽出故不必用汗吐下之法而陰陽不爭表裡並解矣小柴胡湯乃變大柴胡之法而別出心裁用人參以固本又用甘草薑棗以助脾胃又用黃芩以清裡熱使內地奠安無復返顧之慮我既深溝高壘有不戰而屈人之勢而又用柴胡以專散少陽之邪用半夏消痰行氣以化逆譬之自守已固而又時出遊騎以蹴踏之使之進無所得退無所據有不冰消瓦解者乎此則仲景立方之微意非通於神明者不能也注中凡仲景所加減之方皆精當不磨有專治而無通治此其所以可貴也學者須細細參之則於和解一門思過半也黃連湯黃連炒乾薑炒桂枝甘草三兩人參二兩半夏半升大棗十二枚變薑連瀉心之法而為升降陰陽之法寒熱並用補散兼行和法之最佳者黃芩湯黃芩三兩芍藥甘草二兩大棗十二枚古未有治下利之方自仲景立此法以調和腸胃為主後人踵事而增藥味太多失之龐雜者不免矣芍藥甘草湯白芍藥甘草炙各四兩不通則痛腹中不和氣逆而有濁陰此但用甘酸化陰之法而逆氣自消亦高明柔克之義也栝蔞薤白白酒湯栝蔞一枚薤白三兩白酒四斤薤白通陽栝蔞散團結之氣再加白酒以行氣血自能消陰翳而開痹結故不必用辛散耗血之品以傷至高之元氣也溫膽湯陳皮去白半夏薑製茯苓甘草枳實麩炒竹茹加薑煎膽為清靜之府又氣血皆少之經痰火擾之則膽熱而諸病叢生矣溫膽者非因膽寒而與為溫之也正欲其溫而不熱守其清靜之故常方中用二陳竹茹即是此意逍遙散柴胡當歸酒拌白芍酒炒白朮土炒茯苓一錢甘草炙五分加煨薑薄荷煎逍遙散於調營扶土之中用條達肝木宣通膽氣之法最為解鬱之善劑五臟惟肝為最剛而又於令為春於行為木具發生長養之機一有怫鬱則其性怒張不可復製且火旺則剋金木旺則剋土波及他臟理固宜然此於調養之中寓疏通條達之法使之得遂其性而諸病自安加丹參香附二味以調經更妙蓋婦人多郁故也六和湯砂仁藿香厚朴杏仁半夏扁豆木瓜人參白朮赤苓甘草薑棗扁豆一味古方多用之以其有清暑利濕健脾之功也豫以為扁豆之性最劣減去扁豆人參二味更妙藿香正氣散藿香紫蘇白芷大腹皮茯苓三兩白朮土炒陳皮半夏曲厚朴薑製桔梗二兩甘草一兩每服五錢闢穢祛邪兼治瘴氣由其芳烈之性足以勝之而又兼用化痰利濕之品以顧脾胃中州一和則客邪自解矣三解湯柴胡麻黃去節澤瀉各三錢一日一作之瘧邪在衛間日一作之瘧邪在營三陰大瘧則邪在腑皆由先受熱後受寒所致故陰陽交爭內經之訓昭然如揭日月後人紛紛聚訟各出己見反致拋荒經義即如此方通治時瘧究竟有損無益清脾飲青皮厚朴醋炒柴胡黃芩炒半夏薑製茯苓白朮土炒甘草炙草果加薑煎痎瘧一症內經論之甚詳從無一語及臟可見瘧邪斷無入臟之理巢氏病源妄為分配識者譏之清脾飲變小柴胡之制而用黃芩蓋欲其清營分之熱邪使之仍從衛出耳並非病在脾經清脾以治瘧也黃連阿膠丸黃連一兩茯苓二兩阿膠炒一兩為末水熬阿膠為丸黃連阿膠之法開於仲景但阿膠一味所重者在井水而不在驢皮因濟水伏流惟阿井通於濟故有平肝滋腎之功後來射利之徒更將牛羊豬犬雜皮一概入膠敗人脾胃不如不用為佳薑茶飲生薑陳細茶每味約三錢濃煎服此亦調和陰陽之法病輕淺者可用蘆根湯蘆根一斤竹茹一斤生薑二兩粳米一合此治熱鬱胃中作嘔作吐則可若云治寒冷傷胃則豫不敢深信陰陽水沸湯井水各半鍾和服此法甚佳極平淡極神奇屢用屢效之方也甘草黑豆湯甘草二兩黑豆半升但稱解藥毒而已非治病之方也理氣之劑補中益氣湯黃耆蜜炙一錢五分人參甘草炙一錢白朮土炒陳皮留白當歸五分升麻二分柴胡三分薑三片棗二枚煎氣也者人之所賴以生者也大氣積於胸中歸於丹田呼出則由心達肺吸入則由肝納腎無一處不到無一息或停故宗氣為一身之主外護肌表則為衛氣內統血脈則為營氣散布於各臟腑則為各臟腑之氣人能順而養之則氣平而血亦和尚何疾病之有無如七情擾於中六淫侵於外斯百變叢生而鬱氣逆氣動氣滯氣痞氣燥氣寒氣痰氣濕氣水氣種種氣病指不勝屈矣醫者當細心剖析對症施治方免貽誤汪訒庵於理氣門中首選補中益氣湯誠以東垣辨內傷外感剴切詳明使人於陽虛發熱之症不誤作傷寒妄汗妄下保全無限民命實為功於千古即如此方於主治注中治一切清陽下陷中氣不足之症臨後二語明白了當本無謬訛若使東垣遇陰虛發熱及上實下虛之症亦斷不用此方乃不善學者每有先入之見膠執於中一遇發熱不論陽虛陰虛不論上實下實遂謂甘溫能除大熱動輒參耆升柴為害非小醫貫曰讀傷寒書而不讀東垣書則內傷不明而殺人多矣讀東垣而不讀丹溪書則陰虛不明而殺人多矣此誠持平之論也夫學醫而知宗仰東垣不可謂非有志之士然尚不可預有成心又況峻烈之品險怪之法豈可輕試乎哉烏藥順氣散烏藥橘紅二錢麻黃去節川芎白芷桔梗枳殼炒一錢殭蠶去絲嘴炒炮薑甘草炙五分加薑蔥煎中風之症皆由氣血虧虛外風乘隙而入便當著意調營使風從衛出又或痰火內蘊外風乘之便當清營化痰息風理氣此方多用升散於養血化痰二義闕然與注中治中風等症未為合法也蘇子降氣湯蘇子半夏前胡厚朴薑炒橘紅當歸一錢甘草炙肉桂五分加薑煎此等方施之於濕痰壅塞中脘不舒者尚嫌其太燥乃注中主治虛陽上攻喘嗽嘔血等症是益火加薪吾見其立敗也木香順氣湯木香草蔻仁益智蒼朮二分厚朴四分青皮陳皮半夏吳茱萸湯泡乾薑二分茯苓澤瀉二分升麻柴胡一分當歸五分東垣此方升清降濁使中脘開通極有意義但辛燥太過宜酌用之四磨湯檳榔沉香烏藥人參等分濃磨煎三四沸溫服四磨湯原為氣逆喘急而設若用人參不如勿服之為佳矣除人參加木香枳實者為宜且於氣厥者尤合越鞠丸香附醋炒蒼朮泔浸炒撫芎神麯炒梔子炒黑等分曲糊為丸凡郁病必先氣病氣得流通鬱於何有此方注云統治六郁豈有一時而六郁並集者乎須知古人立方不過昭示大法氣鬱者香附為君濕鬱者蒼朮為君血鬱者川芎為君食鬱者神麯為君火鬱者梔子為君相其病在何處酌量加減方能得古人之意而不泥古人之方讀一切方書皆當作如是觀七氣湯半夏薑汁炒五錢厚朴薑汁炒三錢茯苓四錢紫蘇二錢加薑棗煎七情受病兼有痰涎一時舉發則有之理氣化痰開解鬱結七氣湯所以為佳也四七湯人參官桂半夏一錢甘草五分加薑煎越鞠丸治氣實之郁四七湯治氣虛之郁虛則寒生不可謂氣病絶無寒症也備此一法庶無偏勝之患代赭旋覆湯旋覆花三兩代赭石一兩人參二兩甘草三兩半夏半升生薑五兩大棗十二枚汗吐下後中虛氣逆不可再攻故用重以鎮之甘以緩之辛以散之之法丁香柿蒂湯丁香柿蒂二錢人參一錢生薑五片厄逆之症非一端若腎氣不收厥逆而上頭汗微喘當用大劑參附以收攝真陽此治連珠發厄之要法非丁香柿蒂等所能勝任也若因寒犯胃氣鬱而厄者則此方為宜丹溪乃以相火上衝之厄為辭豈厄逆之症但有火厄竟無寒厄乎是又過當之談矣橘皮竹茹湯橘皮竹茹人參甘草半夏麥冬赤苓枇杷葉加薑棗煎此則治痰火之厄而不可以治胃寒之厄若誤用之則輕者增劇定喘湯白果二十一枚炒黃麻黃半夏薑製款冬花三錢桑皮蜜炙蘇子二錢杏仁去皮尖黃芩一錢五分甘草一錢加薑煎治痰先理氣不為疏泄則膠固不通此定喘用麻黃之意也理血之劑四物湯當歸酒洗生地三錢芍藥二錢芎藭一錢五分血之取義一為榮榮者發榮也非血則無以潤臟腑灌經脈養百骸此滋長之義也一為營營者營壘也非血則無以充形質實腠理固百脈此內守之義也水穀之精聚於中焦受氣變化然後成血日生幾何不知調養而反行耗散血病多多矣或目睛流血耳中出血鼻中衄血口中吐血舌痛出血牙宣出血毛竅出血小溲溺血大便瀉血或崩漏或痔漏或蓄血如狂或血痞作脹或經閉不通或妄行血脫以致跌撲之傷血瘡瘍之潰血病既種種不同治病之法或補之或養之或涼之或溫之或散之或破之立方須一一對症理血門以四物湯為主方藥雖四味而三陰並治當歸甘溫養脾而使血有統白芍酸寒斂肝而使血能藏生地甘寒滋腎而益血川芎辛溫通氣而行血調補血分之法於斯著矣乃或有譽之太過毀之失實者不可以不辨也譽之過者謂能治一切亡血及婦人經病夫亡血之症各有所由起此方專於補血滋腎而已無他手眼不溯其源而逐其流豈能有濟至婦人經病多有氣鬱伏寒痰塞等正未可以陰寒之品一概混投此譽之太過也毀之失實者謂川芎一味辛散太過恐血未生而氣先耗殊不知亡血之人脾胃必弱若無川芎為之使則陰寒之品未能滋補而反以礙脾此毀之失實也至精求之以為凡治血症當宗長沙法兼用補氣之藥無陽則陰無以生此論最確又恐執定有形之血不能速生無形之氣所當急固遂至補氣之藥多於補血是又矯枉過正反坐拋荒本位之失矣此愈不可不知也當歸補血湯黃耆炙一兩當歸酒洗二錢空心服當歸補血湯黃耆多於當歸五倍以之專治氣分尚恐滿中若云養血則輕重尚宜斟酌歸脾湯人參白朮土炒茯神棗仁炒龍眼肉二錢黃耆炙一錢五分當歸酒洗一錢木香甘草炙五分遠志一錢薑棗煎歸脾湯專治心脾陰中之陽藥故不用地黃白芍後人加作黑歸脾殊失立方之旨矣養心湯黃耆蜜炙茯苓茯神當歸酒洗半夏曲川芎一兩甘草炙一錢柏子仁去油酸棗仁炒遠志去心五味子人參肉桂二錢五分每服五錢方中心經藥為多而其餘佐使亦能配合引入心臟故專以養心為名制方極有意義人參養營湯人參白朮黃耆蜜炙甘草炙陳皮桂心當歸酒拌一錢熟地五味子炒茯苓七分遠志五分白芍一錢五分加薑棗煎此實三陰並補氣血交養之劑注中但言治脾肺兩經未免挂漏論者但議其及肺與不及肺抑末也龍腦雞蘇丸雞蘇葉一兩六錢生地黃六錢麥冬四錢蒲黃炒木通阿膠炒銀柴胡二錢甘草一錢五分黃耆一錢人參一錢先將木通柴胡浸二日熬汁地黃浸汁熬膏再加蜜三兩煉過和丸清鬱熱而瀉濕火此方最佳惟近日之阿膠斷不可用柴胡黃耆再為酌減斯盡善矣咳血方青黛水飛栝蔞仁去油海石炒黑山梔炒黑訶子肉等分為末蜜丸噙化嗽甚加杏仁咳嗽痰血固屬君相之火犯肺此方但清火而不治血乃去所擾則自安之義然業經失血則肺已大傷豈可置之不論不議去訶子而加清養肺陰之藥始為得之獨聖散白芨為末每服二錢臨臥糯米湯下肺壞能補惟有白芨此獨聖之所以得名也清咽太平丸薄荷十兩川芎防風犀角柿霜甘草二兩桔梗三兩蜜丸於清涼中寓升散之法非特火鬱則發之亦非此不能清解上焦也還元水童便取十一二歲無病童子不茹葷辛清徹如水者去頭尾熱飲冬則用湯溫之或加藕汁和服童便乃真陰又無嗜欲以之滋腎降火誠治血之妙品麻黃人參芍藥湯桂枝五分麻黃黃耆甘草炙白芍各一錢人參三分大麥冬三分五味子五粒當歸五分熱服麻黃人參湯非教人補中當用散藥正教人散中當用補藥也氣血虧弱之人易受外感風寒深入不得不為表散若徑用麻桂等湯發汗後虛陽欲絶矣東垣立此方以治虛人之表病天下後世可知固本治標之法矣犀角地黃湯生地黃一兩五錢白芍一兩丹皮犀角二錢五分每服五錢犀角化斑解毒涼血清心又能引地黃直達腎經壯水制火故吐衄症中多用之然治心腎則有餘而非肺肝之正藥若治衄血等不如羚羊角之效至謂升麻可代犀角則其説尤謬既有鬱火再加風藥逼血上升不旋踵而敗矣桃仁承氣湯桃仁五十粒去皮尖研大黃四兩芒硝甘草桂枝一兩此方準繩以為當用桂喻西江等以為當用枝豫則以為主治注中有外症不解一語此四字最為著眼有桃仁大黃芒硝甘草以治里必當用桂枝以解表仲景立方固無遺漏也抵當湯水蛭三十個豬脂熬黑虻蟲三十個去頭足翅桃仁二十枚去皮尖研大黃四兩酒浸此症雖瘀熱結於少腹極陰之處不得以里症名之蓋膀胱乃太陽本經之病非由太陽傳裡之症但水蛭虻蟲二味人不敢用即代抵當丸尚嫌其太峻槐花散槐花炒側柏葉杵荊芥炒黑枳殼炒等分為末每三錢米飲下陳修園云五臟各有守經之血六腑無血試看豬羊腸胃中豈有一絲一點之血世人謂巨口吐紅為胃血者妄也此説頗有識解惜其但見得一層尚遺漏一層豫特申明之夫五臟主藏故各有守臟之血六腑主傳故無守腑之血方其無病之時胃中納水穀大小腸傳糟粕腸胃中本無血也血但流灌於腑外以榮養之經所謂灑陳六腑此一語不得滑口讀過逮至火勢沖激或濕熱熏蒸逼血入於腑中腑不能容隨受亦隨出矣故血淋尿血血之由小腸而出者也瀉血痔血血之由大腸而出者也大小腸既有血症而胃獨無血症有是理乎胃經之血隨火上升直從食管而出往往盈碗盈盆至內傷之血則由肺經氣管而出自是兩途故胃血易治肺血難治數千年來從未有將無血而有血之故徹底發明者豫故因論槐花散一方而詳及之槐花散寒涼太過腸風下血中氣必虛再用陰寒血更凝結方中去柏葉加參朮當歸陳皮甘草庶有瘳乎秦艽白朮散秦艽白朮歸尾酒洗桃仁研一兩枳實麵炒皂角子燒存性澤瀉五錢地榆三錢麵糊丸凡痔漏之疾多起於濕熱下注然又有本體陰虛者一味去風燥濕反致劫陰況服皂角子者令人每發眩暈此方立意雖佳然陰虛者未可輕投也芍藥湯芍藥一兩歸尾黃芩黃連五錢大黃三錢木香檳榔甘草炙二錢桂一錢五分此即通因通用之法濕熱鬱蒸氣血瘀壅故下利而後重行血理氣則血止而後重自除矣蒼朮地榆湯蒼朮泔浸炒三兩地榆炒黑一兩每一兩煎一燥濕一涼血亦治下利之正法然止此二味尚未足以扶土和營也小薊飲子小薊蒲黃炒黑藕節滑石木通當歸生地黃梔子炒淡竹葉甘草各五分清心與小腸之熱滋腎水而通膀胱自可以治淋而止痛復元羌活湯柴胡五錢當歸栝蔞根穿山甲炮二錢甘草紅花二錢桃仁五十去皮尖研大黃一兩酒浸每服一兩加酒煎治跌撲損傷之法破瘀第一行氣次之活血生新又次之此方再加一二味行氣之藥更佳祛風之劑小續命湯防風一錢二分桂枝麻黃杏仁去皮尖炒研芎藭酒洗白芍酒炒人參甘草炙黃芩酒炒防己八分附子四分每服三錢加薑棗煎天地之氣鬱而必宣風也者乃大塊噫氣鼓蕩萬物者也然有和風有烈風有怪厲之風有微柔之風和風則不疾不徐人縱感之不為大害烈風則咸知畏避受者反少怪厲之風本不常有惟微柔之風最易中人微則難防柔則善入虛人腠理不密外風乘隙而投由表及裡病亦由淺入深前於醫醇剩義中已將中絡中經中腑中臟之症縷析條分茲不復贅但於各方後竊附管見小續命湯乃治六經中風之通劑方中補氣血去風寒清濕熱之藥俱備非各分門類之專方易老加減法亦不過示人以用藥之大凡至於入腑入臟之症則固未嘗議及也侯氏黑散菊花四十分防風白朮十分桔梗八分人參茯苓當歸川芎乾薑桂枝細辛牡蠣礬石三分上末用溫酒調方寸匕服二十日再冷服四十日共六十日止則藥積腹中矣此方佳處全在平肝息風內風不動則不與外風勾結此便是阻截之法喻西江盛稱其用牡蠣礬石堵御之妙豫請為進一解當實衛氣以為城垣當養營血以堅壁壘若使藥積腹中以為堵截吾恐風不得入者氣血亦由此不通無怪誤解填塞空竅者之滋議也大秦艽湯秦艽石膏二兩當歸酒洗白芍酒炒川芎生地酒洗熟地白朮土炒茯苓甘草炙防風黃芩酒炒羌活獨活白芷一兩細辛五錢每服一兩此方劉宗厚與喻嘉言俱謂其風藥太多不能養血益筋骨汪訒庵又謂用此方者取效甚多各執一見豫謂方中四物咸備不可謂無血藥也若中風初起表邪重者用之尚可取效然石膏細辛二味必須減去三生飲生南星一兩生川烏去皮五錢生附子去皮五錢木香二錢每服一兩加人參一兩煎邪之所湊其氣必虛是也然邪往從之虛處轉實又何説邪東垣謂中風非外風乃本氣自病太屬偏執此等峻猛之藥雖有人參氣虛者能任受耶如喻嘉言之加減為宜地黃飲子熟地黃巴戟去心山茱萸肉蓯蓉酒浸附子炮官桂石斛茯苓遠志麥冬石菖蒲五味子等分每服五錢入薄荷少許薑棗煎服清肝氣以益水之源納腎氣以制火之僭水能涵木孤陽不升則心氣通而舌喑自解矣惟足廢不能行尚當加壯筋利節之藥至其不用風藥正恐以助火故特為迸去未可議之也順風勻氣散白朮二錢烏藥一錢五分人參天麻五分沉香磨三分白芷蘇葉木瓜青皮甘草炙三錢加薑煎順風勻氣全是氣分藥並無活血舒筋之藥以之順氣疏風則可若治半身不遂口眼喎斜當加血藥舒筋為是豨蘞丸豨蘞草以五月五日七月七日九月九日採者佳不拘多少揀去粗莖留枝花葉實酒拌蒸曬九次蜜丸豨蘞之性一味搜風逐濕若風濕相摶腿足麻痹及諸濕瘡皆可用以治中風喎僻徒益之燥耳牽正散白附子殭蠶全蠍等分為末每二錢酒調服但口眼喎斜而別無他症則經絡臟腑均未受傷乃太陽陽明兩經之風痰蘊熱所致三藥直走內絡祛風化痰極為得力故不必加血藥也如聖散羌活防風白芷柴胡甘草黃芩半夏川芎芍藥當歸烏藥加薑煎入薑汁竹瀝服柔痙加白朮桂枝剛痙則加蒼朮麻黃口噤咬牙大便實加大黃活血祛風化痰清熱剛柔二痙加減亦有法此節庵方之佳者獨活湯獨活羌活防風細辛桂心白薇當歸芎藭半夏人參茯神遠志肉菖蒲五錢甘草炙二錢五分每服一兩加薑棗煎此以息肝風為第一義養心神次之化痰清熱又次之方法極有條理小活絡丹川烏炮去臍皮草烏炮去皮膽星六兩地龍洗焙乾乳香去油沒藥另研三兩三錢酒丸藥力頗峻果有頑痰死血則可用若寒濕流筋及血不養筋者不可誤投消風散荊芥陳皮去白厚朴薑汁炒甘草炙五錢防風羌活藿香殭蠶洗炒蟬蛻川芎人參茯苓二兩為末每服三錢茶湯下風熱上攻治當清解過用辛散是發風助火矣殊非正法也清空膏黃芩酒炒黃連酒炒羌活防風一兩柴胡七錢川芎五錢甘草炙一兩五錢為末每服三錢茶調如膏白湯送下如少陰頭痛加細辛太陰頭痛脈緩有痰去羌活防風川芎甘草加半夏如偏頭痛服之不愈減羌活防風川芎一半加柴胡一倍如自汗發熱惡熱而渴此陽明頭痛只與白虎湯加白芷此則寓清涼於升散中為治風熱之大法若陽明頭痛少陰厥痛血虛頭痛又當別用方法矣胃風湯人參白朮土炒茯苓當歸酒炒芎藭桂炒芍藥酒炒等分加粟米百餘粒煎東垣胃風湯升麻一錢二分麻黃不去節一錢白芷一錢二分葛根一錢柴胡五分羌活五分藁本五分蒼朮五分蔓荊五分草蔻五分黃柏五分當歸五分炙甘草五分加薑棗煎易老胃風湯養血柔肝補脾和胃並無一味風藥而治法特妙蓋緣肝木太旺動而生風犯胃克脾故見飧泄腸風等症但須肝木一和則內風自息若東垣之胃風湯純用風藥且燥亦太過不及遠矣上中下通用痛風丸川芎一兩黃柏酒炒蒼朮泔洗南星薑製二兩桃仁去皮尖搗神麯炒防己白芷一兩羌活威靈仙酒拌三錢龍膽草一兩桂枝三錢紅花二錢麵糊丸此於風寒濕之外又兼治痰與血丹溪原自謂通劑不過舉此以示大法病有專在何經者必須對症立方不得用此通共之劑反傷無病之處也史國公藥酒方羌活防風白朮土炒當歸酒洗川牛膝酒浸川萆薢杜仲薑汁炒松節杵虎脛骨酥炙鱉甲酥炙晚蠶砂炒二兩秦艽蒼耳子炮捶碎四兩枸杞五兩茄根八兩蒸熟為粗末絹袋盛浸無灰酒三十斤煮熟退火毒服每日數次常令醺醺不斷此酒祛風利濕頗有力於實症為宜若氣虛者當加補氣藥血虛者當加補血藥蠲痹湯黃耆蜜炙當歸酒洗赤芍酒炒羌活防風片子薑黃酒炒甘草炙加薑棗煎營衛不虧風何由入不調營衛而多用風藥者非升痰即助火此方營衛兼顧而又能祛風利濕痹症中之善方也三痹湯人參黃耆茯苓甘草當歸川芎白芍生地黃杜仲薑汁炒桂心川牛膝川續斷細辛秦艽川獨活防風等分加薑棗煎峻補氣血而祛風除寒利濕之法悉寓乎其中本末兼該誠治痹之上策也獨活寄生湯獨活桑寄生秦艽防風細辛當歸酒洗芍藥酒炒川芎酒洗熟地杜仲薑汁炒牛膝人參茯苓甘草桂心等分每服四錢獨活取其獨立不搖不須依傍寄生取其附木而生大得依傍二者相濟又能利筋節而祛風再兼平補營衛疏通寒濕用意頗為周到沉香天麻丸羌活五錢獨活四錢沉香益智仁川烏二錢附子炮天麻防風半夏三錢當歸甘草殭蠶一錢五分每服五錢薑三片煎以之治風寒痰厥則可若因風化火兼有痰涎者斷不可用通頂散藜蘆甘草生用細辛人參川芎一錢石膏五錢為末用一字吹入鼻中有嚏者肺氣未絶可治不過欲其通陽開竅耳然太覺煩瑣不如皂莢散之便捷也烏梅擦牙關方烏梅揩擦牙齦涎出即開木旺則剋土木燥則筋急泄木緩筋則土鬱自開矣
