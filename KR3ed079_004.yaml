body:
  text: 卷四瀉火之劑黃連解毒湯黃連黃芩黃柏梔子各等分此治實邪實火表裡俱盛之劑故用黃芩瀉肺火黃連瀉心火黃蘗瀉腎火又用梔子令上焦之熱邪委婉而下三焦通治藥力頗峻若表裡俱熱胸痞便祕譫語者便當去黃芩加大黃以通之使滯去而熱亦退須細辨之附子瀉心湯大黃一兩黃連黃芩一兩附子一枚去皮傷寒痞滿在心胸而不在胃故用三黃以瀉痞而去熱然惡寒汗出陽氣亦虛故用附子溫腎固陽寒熱並用各有精義非仲景其孰能之半夏瀉心湯半夏半升黃連一兩黃芩甘草炙人參乾薑三兩大棗十二枚此為誤下胸痞而設陽邪鬱於上焦既不能下又不能仍從毛竅而出惟有苦寒瀉熱之法方能消痞解邪而又恐陽邪既去濁陰上干故於清瀉中參入辛溫以預截後患此所以為醫中之聖也白虎湯石膏一斤知母六兩甘草二兩粳米六合先煮石膏數十沸再投藥米米熟湯成溫服同一石膏也合麻黃用之則為青龍合知母用之則為白虎一則欲其興雲致雨以解外邪一則欲其清肅肺胃蕩滌內熱義各有當也然用此方者必須審而又審自汗而渴脈大有力數者咸備方可與之若一誤投禍不旋踵蓋緣此症為濕熱鬱蒸故有汗而煩熱不解既有汗故不可表表則陽脫亦不可下下則耗陰惟有大清肺衛之熱為正法也竹葉石膏湯竹葉二把石膏一斤人參三兩甘草炙二兩麥冬一斤半夏半升粳米半升加薑煎治肺胃虛熱故加人參麥冬加竹葉者恐虛陽內犯胞絡也升陽散火湯柴胡八錢防風二錢五分葛根升麻羌活獨活人參白芍五錢炙甘草三錢生甘草三錢每服五錢加薑棗煎鬱結之火逆而折之則其勢愈激而上升此則全用風藥解散蓋火得風力而升亦因風力而滅故絶不用清寒之品深達火鬱則發之之義也涼膈散連翹四兩大黃酒浸芒硝甘草二兩梔子炒黑黃芩酒炒薄荷一兩為末每服三錢加竹葉生蜜煎解此方者但云此上中二焦瀉火之藥既下焦無病豈得輕用芒硝觀仲景三承氣湯邪在上者不用芒硝可知也殊不知主治條下有大小便祕一語則下焦安得不並治乎當歸龍薈丸當歸酒洗龍膽草酒洗梔子炒黑黃連炒黃柏炒黃芩炒一兩大黃酒浸青黛水飛蘆薈五錢木香二錢麝香五分蜜丸薑湯下苦寒之至無以復加此等峻劑豈可輕試豫意去三黃二香庶幾可用耳龍膽瀉肝湯龍膽草酒炒黃芩炒梔子酒炒澤瀉當歸酒炒車前子木通生地酒炒柴胡生甘草肝膽火盛濕熱鬱蒸者此方為宜下部發病者尤妙左金丸黃連六兩薑汁炒吳茱萸一兩鹽水炒水丸此方之妙全在苦降辛開不但治脅痛肝脹吞酸疝氣等症即以之治時邪霍亂轉筋吐瀉無不神效瀉青丸龍膽草山梔炒大黃酒蒸川芎當歸酒洗羌活防風等分蜜丸竹葉湯下肝性至剛宜柔而不宜伐此方但瀉肝經之鬱火則可若以之治驚恐筋痿等症吾未見其有濟也若去大黃加芍藥丹皮等類為庶幾耳瀉黃散防風四兩藿香七錢山梔炒黑一兩石膏五錢甘草二錢上末微炒香酒調服有風藥以散伏火有清藥以瀉積熱而又用甘緩以和中使不傷正氣此法頗佳清胃散生地丹皮黃連當歸升麻涼血解熱升陽散火胃氣清則諸病自除矣甘露飲生地熟地天冬麥冬石斛茵陳黃芩枳殼枇杷葉甘草等分每服五錢治胃虛發熱兼有血症者則可若積濕化熱又無血症者當去地黃加花粉茯苓等為佳瀉白散桑白皮地骨皮一錢甘草五分粳米百粒易老加黃連肺金有火則清肅之令不能下行故灑淅寒熱而咳嗽喘急瀉肺火而補脾胃則又顧母法也若加黃連反失立方之旨導赤散生地木通甘草梢淡竹葉等分煎心經之火每移於小腸表裡相傳也故治小腸之火必兼清心此為定法蓮子清心飲石蓮肉人參黃耆茯苓柴胡三錢黃芩炒地骨皮麥冬車前子甘草炙二錢空心服柴胡散肝膽之陽邪木不助火則心氣亦安又有參耆足以制之故雖發熱煩渴而不相妨也導赤各半湯黃連黃芩犀角知母山梔滑石甘草茯神麥冬人參加燈心薑棗煎越經症乃心經之熱邪上而通肺本與小腸無關其必兼瀉小腸者欲令上焦之邪俱從小腸出也普濟清毒飲黃芩酒炒黃連酒炒五錢陳皮去白甘草生用玄參二錢連翹板藍根馬勃鼠黏子薄荷一錢殭蠶升麻七分柴胡桔梗二錢為末湯調時時服之天行癘氣最為酷烈病在上焦者天氣中人必於上也此方清熱解毒祛癘疫之氣最為精當清震湯升麻蒼朮五錢荷葉一枚雷頭風者本風陽上擾之症故宜升散而不宜清寒紫雪黃金百兩寒水石石膏滑石磁石水煮三斤搗煎去渣入後藥升麻玄參甘草炙半斤犀角羚羊角沉香木香五兩丁香一兩並搗挫入前藥汁中煎去渣入後藥朴硝硝石各一斤提淨入前藥汁中微火煎不住手將柳木攪候汁欲凝再入後藥辰砂三兩研細麝香一兩二錢研細入前藥拌勻合成退火氣冷水調服每一二錢清火解毒清神闢穢色色俱備治溫疫熱毒瘴氣極佳人參清肌散人參白朮茯苓甘草炙當歸赤芍柴胡乾葛半夏曲加薑棗煎四君以補氣歸芍以養血營衛調則虛煩自退加柴葛者因潮熱無汗欲使陽明之邪從肌表出也白朮除濕湯人參赤茯苓甘草炙柴胡五錢白朮一兩生地黃地骨皮知母澤瀉七錢每服五錢濕勝必化熱重陰生陽也此方名曰除濕而清熱之法悉寓乎其中此真善於清熱者清骨散銀柴胡一錢五分胡黃連秦艽鱉甲童便炙地骨皮青蒿知母二錢甘草炙五分病至骨蒸勞熱全是有陽無陰矣大劑養血尚恐不及徒用清涼豈能有濟且反傷胃氣非善治也石膏散石膏研細每夕新汲水服方寸匕取熱退為度石膏非可常服之物前哲雖有是方吾不取也二母散知母炒貝母炒等分為末服古方二母各一兩加巴霜十粒薑三片臨臥白湯嚼服但用二母力亦淺薄古方加巴霜十粒尤為不倫利膈湯薄荷荊芥防風桔梗甘草人參牛蒡子炒等分為末每服二錢或加殭蠶痰火閉塞故成咽痛寒涼遏抑益之病耳此用輕清解散之法全不用寒涼最為妙法甘桔湯甘草二兩桔梗一兩或等分甘桔二味為咽喉必用之藥至於加味之法則當隨症而施玄參升麻湯玄參升麻甘草各等分玄參清上焦浮遊之火升麻升陽而解毒甘草清熱而解毒藥只三味簡而能到消斑青黛飲青黛黃連犀角石膏知母玄參梔子生地柴胡人參甘草加薑棗煎消毒化斑頗為有力若實火熾盛則地黃人參尚宜酌減玉屑無憂散玄參黃連荊芥貫衆茯苓甘草山豆根砂仁滑石五錢硼砂寒水石三錢為末每一錢先挑入口徐以清水咽下此治實火實痰之重劑若虛火聚於咽喉閉結不通者萬不可用香連丸黃連二十兩吳茱萸十兩同炒去茱萸用木香四兩八錢醋糊丸米飲下裡急後重者氣不通也此亦苦降辛開之法白頭翁湯白頭翁二兩秦皮黃連黃柏三兩香連丸治氣分不通之後重此則治熱傷營血之後重故但清降而不用氣分藥腎熱湯磁石煅紅牡蠣鹽水煮白朮炒五兩麥冬芍藥四兩甘草一兩生地汁蔥白大棗十五枚分三服清寒重鎮所以斂陰退火加以健脾和胃故為有制之師辛夷散辛夷白芷升麻藁本防風川芎細辛木通甘草等分為末每服三錢茶調下辛散太過疏風散寒則宜之非瀉火門中之法蒼耳散白芷一兩薄荷辛夷五兩蒼耳子炒二錢五分為末食前蔥茶湯調下二錢鼻淵一症有為火爍有為風乘有為寒侵種種不同此但可施於風乘者耳亦非瀉火門中之法也除痰之劑二陳湯半夏薑製二錢陳皮去白茯苓一錢甘草五分加薑煎痰之為病最烈痰之為病亦最多積濕與鬱火二者為生痰之大源其餘或因風或因寒或因氣或因食變怪百出隨感而生難可枚舉治痰大法濕則宜燥火則宜清風則宜散寒則宜溫氣則宜順食則宜消二陳湯為治痰之主藥以其有化痰理氣運脾和胃之功也學者隨症加減因病而施則用之不窮矣潤下丸廣陳皮去白八兩鹽水浸洗甘草二兩蜜炙蒸餅糊丸此治痰而兼停飲者桂苓甘術湯茯苓四兩桂枝白朮二兩甘草一兩此治痰而兼有風者清氣化痰丸半夏薑製膽星一兩五錢橘紅枳實麩炒杏仁去皮尖栝蔞仁去油黃芩酒炒茯苓一兩薑汁糊丸淡薑湯下此治痰而兼有火者順氣消食化痰丸半夏薑製膽星一斤青皮陳皮去白萊蔔子生用蘇子炒山楂炒麥芽炒神麯炒杏仁去皮尖研葛根香附制各一兩薑汁糊蒸餅為丸此治痰而兼有食者清肺飲杏仁去皮尖貝母茯苓一錢桔梗五味子甘草橘紅五分加薑煎此治痰而兼有濕火者金沸草散旋覆花前胡細辛一錢荊芥一錢五分半夏五分赤茯苓六分甘草炙三分加薑棗煎此治痰而兼疏風者百花膏百合款冬花等分蜜丸此治痰而兼清熱者三仙丹南星曲半夏曲四兩香附二兩糊丸此治痰而兼理氣者半夏天麻白朮湯半夏薑製麥芽一錢五分神麯炒白朮炒一錢蒼朮泔浸人參黃耆蜜制陳皮茯苓澤瀉天麻五分乾薑三分黃柏二分酒洗每服五錢此治痰而兼熄風者茯苓丸半夏曲一兩茯苓一兩乳拌枳殼五錢麩炒風化硝二錢五分薑汁糊丸此治痼結之頑痰非大實者不可輕投控涎丹甘遂去心大戟去皮白芥子等分為末糊丸臨臥薑湯服此治痰而兼逐水者亦不可輕用三子養親湯紫蘇子白芥子萊蔔子各微炒研煎服此治痰而兼降氣者滌痰湯半夏薑製膽星二錢五分橘紅枳實茯苓二錢人參菖蒲一錢竹茹七分甘草五分加薑煎此治痰而兼去風清心者礞石滾痰丸青礞石一兩沉香五錢大黃酒蒸黃芩八兩上將礞石打碎用朴硝一兩同入瓦罐鹽泥固濟曬乾火煅研末和諸藥水丸此治實痰實火者牛黃丸膽星全蠍去足焙蟬蛻二錢五分牛黃白附子殭蠶洗焙防風天麻一錢五分麝香五分煮棗肉和水銀五分細研入藥末為丸荊芥薑湯下此治痰而兼熄風清心者辰砂散辰砂一兩乳香棗仁五錢溫酒調下此治痰而兼定驚者白金丸白礬三兩鬱金七兩薄荷糊丸此治痰而兼解鬱者青州白丸子白附子生用南星生用二兩半夏水浸生衣生用一兩川烏去皮臍生用五錢為末絹袋盛之水擺出粉未盡再搖再擺以盡為度貯磁盆日曬夜露春五日夏三日秋七日冬十日曬乾糯米糊丸如緑豆大每服二十丸薑湯下此治痰而兼祛風者星香散膽星八錢木香二錢為末服此治痰而兼行氣者常山飲常山燒酒炒二錢草果煨檳榔知母貝母一錢烏梅二個薑三片棗一枚半酒半水煎露一宿日未出時面東空心溫服此治痰而兼分陰陽者瘧不可截用此方者每貽後患大率邪伏於內脾氣受傷致成脹滿者多矣截瘧七寶飲常山酒炒草果煨檳榔青皮厚朴陳皮甘草等分用酒水各一鍾煎熟絲棉蓋之露一宿於當發之早面東溫服較前方之用知母烏梅者稍可然亦非正法也消導之劑平胃散蒼朮泔浸二錢厚朴薑炒陳皮去白甘草炙一錢加薑棗煎人非脾胃無以養生飲食不節病即隨之多食辛辣則火生多食生冷則寒生多食濃厚則痰濕俱生於是為積聚為脹滿為瀉痢種種俱見平胃散乃治脾胃之聖劑利濕化痞消脹和中兼治時疫瘴氣燥而不烈故為消導之首方枳朮丸白朮三兩土蒸枳實一兩麩炒為末荷葉包陳米飯煨乾為丸一補脾一去實簡當有法勿以其平易而忽之保和丸山楂三兩神麯炒茯苓半夏一兩陳皮萊蔔子微炒連翹五錢曲糊丸麥芽湯下此亦和中消導之平劑惟連翹一味可以減去健脾丸人參白朮土炒二兩陳皮麥芽炒一兩枳實三兩山楂一兩五錢神麯糊丸米飲下此乃補中用消之法正其善於用補也否則滯濁之氣不清縱有補劑必且格而不入矣枳實消痞丸枳實麩炒黃連薑汁炒五錢厚朴薑炒四錢半夏曲麥芽炒人參白朮土炒甘草炙茯苓三錢乾薑二錢蒸餅糊丸此方佳處全在薑連苦辛便能平木否則全不關照肝經主治條下右關脈弦一語其謂之何痞氣丸黃連八錢厚朴五錢吳茱萸三錢白朮土炒黃芩二錢茵陳酒炒乾薑炮砂仁一錢五分人參茯苓一錢澤瀉一錢川烏炮川椒炒五錢桂巴豆霜四分蜜丸燈草湯下攻補兼行而又苦辛開降頗有意義惟川烏巴霜則斷不可用葛花解酲湯葛花豆蔻砂仁一錢木香一分青皮陳皮人參白朮炒茯苓四分神麯炒乾薑豬苓澤瀉三分補脾利濕又兼快胃故能治吐瀉痞滿等症用葛花者所以解酒毒鱉甲飲鱉甲醋炙白朮土炒黃耆芎藭白芍酒炒檳榔草果麵煨厚朴陳皮甘草等分薑三片棗一枚烏梅少許煎此亦攻補並行之劑但欲去瘧母故以鱉甲為君耳收澀之劑赤石脂禹餘糧湯赤石脂禹餘糧等分杵碎煎利在下焦者小腸之水不從膀胱化出也故仲景有服此湯復利不止當利其小便之訓桃花湯赤石脂一斤乾薑一兩粳米一升病在下焦腎藏虛寒下利膿血不由傳經亦非協熱故用收澀而兼甘溫乃仲景之變例也訶子飲御米去蒂蜜炒五分訶子去核七分乾薑炮六分橘紅五分上末空心服粟殼訶子性皆寒澀故用乾薑橘皮以通陽此從桃花湯化出真人養臟湯罌粟殼去蒂炙三兩六錢訶子麵裹煨一兩三錢木香二兩四錢肉豆蔻麵裹煨五兩肉桂八錢人參白朮炒當歸六錢白芍炒一兩六錢生甘草一兩八錢每服四錢此亦澀中寓溫之法加入補氣補血之藥於久病正虛者尤宜當歸六黃湯當歸生地熟地黃芩黃柏黃連等分黃耆加倍此氣血平補而兼瀉火之劑並無澀藥不宜收入澀門牡蠣散牡蠣煅研黃耆麻黃根一錢浮小麥百粒煎服固表清煩即以止汗此法是也柏子仁丸柏子仁炒研去油二兩人參白朮半夏五味子牡蠣麻黃根一兩麥麩五錢棗肉丸米飲下五十丸日三服養心陰而實肌表故能補虛止汗茯菟丹菟絲子十兩五味子八兩石蓮肉白茯苓三兩山藥六兩將菟絲子用酒浸浸過余酒煮山藥糊為丸亦補腎澀精之平劑腎氣虛寒者可用若有火者則菟絲尚宜酌易治濁固本丸蓮鬚黃連二兩黃柏益智仁砂仁半夏薑製茯苓一兩豬苓二兩甘草炙三兩寓澀於利用意甚佳濕熱不去則濁無止時徒用澀藥反致敗精塞竅矣水陸二仙丹金櫻膏熬膏一斤芡實一斤蒸熟為粉和丸亦能澀精固氣但力量甚薄尚須加味金鎖固精丸沙苑蒺藜炒芡實蒸蓮鬚二兩龍骨酥炙牡蠣鹽水煮一日一夜煅粉一兩蓮子粉為糊丸潛陽納氣火不動則精宮自固矣人參樗皮散人參樗根白皮東引者去粗皮醋炒等分為末米飲或酒調下日久血虛濕退者方可若濕熱尚重則留邪為害桑螵蛸散人參茯苓遠志石菖蒲鹽炒桑螵蛸鹽炒龍骨煅龜板酥炙當歸等分為末臨臥服二錢人參湯下交通心腎去虛熱而固精此方最佳殺蟲之劑烏梅丸烏梅三百個細辛桂枝人參附子炮黃柏六兩黃連一斤乾薑十兩川椒當歸四兩苦酒浸烏梅一宿去核蒸熟和藥蜜丸蟲無濕不生觀腐草為螢可知也殺蟲之中兼燥濕利濕之法非深達本源者能之乎集效丸大黃炒一兩五錢鶴蝨炒檳榔訶子皮木香蕪荑炒乾薑炒附子七錢五分蜜丸食前烏梅湯下婦人醋湯下雄檳丸雄黃檳榔白礬等分飯丸每五分食遠服藥性稍烈虛人忌之化蟲丸鶴蝨胡粉苦楝根東引未出土者檳榔一兩蕪荑使君子五錢枯礬二錢五分為末酒煮麵糊作丸量人大小服之亦是殺蟲之法但不如前二方之為佳使君子丸使君子去殼二兩南星薑製檳榔一兩上藥合炒如食生米用麥芽一斤炒食茶葉用茶葉炒食炭土用炭土炒取藥為末蜜丸每晨沙糖水送下於殺蟲之中從其類而餌之治法殊妙獺肝丸獺肝一具陰乾為末水服二錢日三次以幽通幽而又能隨月盈縮故獨為靈異消渴殺蟲方苦楝根取新白皮一握切焙入麝香少許煎空心服蟲病消渴症不常有麝香尤屬非宜明目之劑滋陰地黃丸熟地一兩生地一方一兩五錢一方七錢五分柴胡八錢黃芩酒炒當歸酒洗五錢天冬地骨皮五味子三錢人參二錢黃連酒炒三錢甘草炙枳殼麩炒二錢蜜丸養陰補血兼清風火用五味子所以收耗散之氣而使瞳神復舊也加減駐景丸枸杞子五味子車前子炒二兩楮實子川椒炒一兩熟地當歸五兩菟絲子八兩酒浸蜜丸酒下方法甚佳惟川椒一味辛辣耗氣必須減去定志丸遠志菖蒲二兩人參茯苓一兩蜜丸硃砂為衣張子和方無菖蒲加茯神柏子仁棗仁亦名定志丸酒糊丸定志丸以張子和之所加者為佳地芝丸生地焙天冬四兩枳殼炒甘菊花去蒂二兩蜜丸茶清或酒下枳殼一味並非欲其寬腸去滯欲其合甘菊使藥力上行也人參益胃湯黃耆人參一兩甘草炙八錢白芍炒黃柏酒炒三錢蔓荊子二錢每四錢日二服此方極善但於內障一層尚少著意加穀精石決斯為得耳消風養血湯荊芥蔓荊子菊花白芷麻黃防風桃仁去皮尖紅花酒炒川芎五分當歸酒洗白芍酒炒草決明石決明甘草一錢目赤腫痛自宜疏風清火川芎一味辛散太過宜減去加蟬衣桑葉丹皮洗肝散薄荷羌活防風當歸川芎梔子大黃甘草炙等分為末每服二錢有大黃之寒下則川芎在所不忌補肝散夏枯草五錢香附一錢每服五錢臘茶下肝無補法養血便是補肝此方但行氣而不養血負此名矣撥雲退翳丸當歸一兩五錢川芎地骨皮白蒺藜荊芥密蒙花甘菊花羌活木賊一兩川椒一錢五分天花粉蔓荊子薄荷甘草炙五錢枳實五錢黃連蛇蛻蟬蛻三錢蜜丸去川椒蛇蛻加蕤仁石決為宜石膏羌活散羌活荊芥白芷藁本細辛川芎蒼朮甘菊密蒙花菜子麻子木賊黃芩石膏甘草等分為末每服一二錢但有辛散並無滋養非法也防風飲子黃連炒甘草炙人參一錢當歸一錢五分葛根防風五分細辛蔓荊子三分食後服此較前方為勝以其有人參一味也羊肝丸夜明砂淘淨蟬蛻木賊去節當歸一兩酒洗羊肝四兩搗爛為丸以目入目且能散瘀去障故為有法兔矢湯兔矢二錢茶清調服兔矢一味甚有意但需加養血藥經産之劑表實六合湯四物湯四兩每味一兩麻黃細辛五錢胎前有病若至危急方顧母而不顧子否則雖有外邪必不可損傷胎氣如此症表實無汗雖從太陽發表例而必用四物乃正法也膠艾湯阿膠芎藭甘草二兩艾葉當歸三兩芍藥四兩乾地黃六兩水五升酒三升煮取三升內阿膠煬化有四物以補血而又加膠艾以和陰陽故為止崩漏腹痛之良法鉤藤湯鉤藤勾當歸茯神人參一錢桔梗一錢五分桑寄生五分息風清火兼通筋節妙在安養心神所以能保胎氣羚羊角散羚羊角屑一錢獨活防風芎藭當歸棗仁炒茯神杏仁苡仁五分木香甘草二分半加薑煎熄風清火至為有法若去苡仁加貝母亦可紫蘇飲蘇葉一錢當歸七分芎藭芍藥人參陳皮大腹皮五分甘草二分加薑煎腹痛加木香延胡索胎氣上逆自當寬中下氣加木香者猶可加元胡索則不可以其破血礙胎也天仙藤散天仙藤即生木香藤微炒香附炒烏藥陳皮甘草炙等分加紫蘇三葉木瓜生薑各三片空心煎服疏通血氣兼以去風不加利濕藥者恐傷胎也白朮散白朮一錢薑皮陳皮茯苓皮大腹皮五分為末米飲下健脾和胃使水氣從皮膚而出故消腫而不礙里竹葉湯麥冬一錢五分茯苓黃芩一錢人參五分淡竹葉十片清心解煩養正補虛節節入解紫菀湯紫菀天冬一錢桔梗五分甘草炙桑白皮杏仁三分竹茹二分入蜜溫服清潤肺氣亦為平妥參朮飲當歸熟地芎藭芍藥人參白朮甘草炙陳皮半夏加薑煎空心服調養營衛化痰理氣清升濁降則胎與胞自安矣黑神散熟地歸尾赤芍蒲黃炒桂心乾薑炒甘草四兩黑豆炒去皮半升每服二錢酒童便各半煎此方當去熟地加桃仁方為得力失笑散蒲黃五靈脂等分為末産後以去瘀為最要此方得之清魂散澤蘭葉人參三分川芎五分荊芥一錢甘草炙三分為末溫酒調下荊芥乃治血暈之聖藥調氣血而去外風則神自清矣返魂丹五月五日六月六日或小暑日益母草花正開時連根採收陰乾用花葉及子石臼搗末蜜丸或搗汁於砂鍋內文武火熬成膏服忌鐵祛瘀生新則有之畢竟祛瘀之力倍於生新産後用以祛惡露則可若謂其有種種功效未免譽之太過當歸羊肉湯黃耆一兩人參當歸三錢生薑五錢用羊肉一斤煮汁去肉入前藥煎服肉血有情補形補氣故元氣斂而汗自收當歸散當歸芎藭芍藥黃芩一斤白朮半斤為末酒調服養營血清血熱健脾胃而安胎懷孕者最宜啓宮九芎藭白朮半夏曲香附一兩茯苓神麯五錢橘紅甘草一錢粥丸痰塞於宮不能孕育故以化痰行氣之法以通其塞達生散當歸酒洗芍藥酒炒人參白朮土炒陳皮紫蘇一錢甘草炙二錢大腹皮三錢入青蔥五葉黃楊腦子七個煎於峻補氣血中疏通流利使氣血不壅滯自無留難之患豬蹄湯豬蹄一隻通草即木通一兩煮食潤而兼通較用王不留行及甲片者為妥人參荊芥散人參白朮熟地酸棗仁鱉甲童便炙羚羊角枳殼柴胡荊芥五分防風甘草芎藭當歸桂心三分加薑煎於滋補之中用升散之法故風去而血不傷良劑也柏子仁丸柏子仁去油牛膝酒浸卷柏各五錢澤蘭續斷二兩熟地一兩蜜丸米飲下去卷柏加當歸丹參茺蔚子等為佳芎歸六君子湯當歸芎藭人參白朮茯苓甘草橘紅半夏加薑煎行血補氣而兼消痰則經水自無阻滯矣連附四物湯四物湯加香附黃連黃連以清血熱香附以通厥陰不涼不燥最為合法固經丸龜板炙四兩芍藥酒炒黃柏酒炒三兩黃芩炒二兩香附童便酒炒樗皮炒一兩五錢酒丸龜板黃柏黃芩多服令人絶産此等方斷不可用升陽舉經湯補中益氣湯加白芍黑梔子薑三片棗三枚煎升陽退熱調和氣血故亦能止崩漏如聖散棕櫚燒烏梅一兩黑薑一兩五錢為末每服二錢烏梅湯下氣不攝血當以補氣為先截止太過獨不慮積瘀為患乎牡丹皮散丹皮桂心歸尾延胡索三分牛膝赤芍莪朮六分三稜四分水酒各半煎祛瘀破結本治瘕之正法惟體弱者宜酌減正氣天香散香附八錢烏藥二錢陳皮蘇葉一錢乾薑五分每五六錢煎解鬱散氣血自流行再加當歸一味亦可抑氣散香附四兩陳皮二兩茯神甘草炙一兩為末每服二錢輕淺小方服之亦無害固下丸樗皮一兩五錢白芍五錢良薑煅黑黃柏煅黑三錢粥丸米飲下但可施於濕熱下注者耳若營衛虧損者不可服當歸煎丸當歸熟地白芍炒赤芍炒一兩阿膠續斷牡蠣煅一兩地榆炒黑三錢醋糊丸米飲下此治虛人之帶下尚當加氣分藥一二味白芷散白芷一兩海螵蛸二個煅胎髮一錢煅為末酒調下二錢胎髮一味極有意義用先天之血餘以治赤帶也
