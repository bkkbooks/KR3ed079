body:
  text: 卷三祛寒之劑理中湯白朮陳壁土炒二兩人參乾薑炮甘草炙一兩每服四錢自利腹痛者加木香不痛利多者倍加白朮渴者倍白朮蜷臥沉重利不止加附子腹滿去甘草嘔吐去白朮加半夏薑汁臍下動氣則去朮加桂悸加茯苓陰黃加茵陳寒結胸加枳實本方等分蜜丸名理中丸寒有外感有傳經有直中有痼冷外感之寒先病在表後傳入里必發熱而惡寒此傷寒之寒病也直中之寒手足厥冷並不發熱痼冷在內遇寒而發暴猝厥逆其勢尤重此中寒門之寒病也施治之法傷寒一門在表者宜辛散傳裡者宜辛溫中寒一門則每用辛熱回陽急救之法此傷寒中寒治法之分也理中湯治傷寒太陰病腹痛便溏等症亦通治中脘虛寒惟云治結胸吐蛔感寒霍亂此兩條則宜去人參甘草量加厚朴砂仁等味為妥四逆湯附子一枚生用乾薑一兩甘草炙二兩冷服面赤加蔥九莖腹痛加芍藥二兩咽痛加桔梗一兩利止脈不出加人參二兩嘔吐生薑二兩四逆湯為四肢厥逆而設仲景立此方以治傷寒之少陰症若太陰之腹痛下利完穀不化厥陰之惡寒不汗四肢厥冷者亦宜之蓋陰慘之氣深入於裡真陽几几欲絶非此純陽之品不足以破陰氣而發陽光又恐薑附之性過於燥烈反傷上焦故倍用甘草以緩之立方之法盡美盡善後人分傳經為熱厥直中為寒厥程郊倩譏之然亦有未可盡非者仲景曰傷寒一二日至四五日而厥者必發熱應下之此明明説厥逆在前發熱在後及至發熱則不復厥冷乃傷寒失下之症故蕩滌邪滯則發熱自退本非為厥而不熱者言也程氏又云下之者下其熱非下其厥也遇發熱則可下遇厥則萬不可下此數語最為明白了當可見傳經之邪亦自有當下者但不可概謂之熱厥耳四逆者必手冷過肘足冷過膝脈沉細無力腹痛下利等象咸備方可用之否則不可輕投當歸四逆湯當歸桂枝芍藥細辛三兩甘草炙通草二兩大棗二十五枚仲景又曰其人素有久寒者加吳茱萸二升生薑半斤酒六升和煮名四逆加吳茱萸生薑湯厥陰為藏血之經故當歸四逆湯以和營為主加桂枝細辛以和衛營衛和則厥自解矣雖有寒而不加薑附者恐燥烈太過劫陰耗血也四逆散柴胡芍藥炒枳實麩炒甘草炙等分為末水調飲四逆散乃表裡並治之劑熱結於內陽氣不能外達故里熱而外寒又不可攻下以礙厥故但用枳實以散鬱熱仍用柴胡以達陽邪陽邪外泄則手足自溫矣真武湯附子炮一枚白朮炒三兩茯苓白芍炒生薑三兩北方曰幽都乃陰寒濕濁之地賴真武之神運用水火以鎮攝之濁陰方漸得解散此方取名真武乃專治腎臟之劑坎之為象一陽居二陰之中水中之火是為真火此火一衰則腎水泛濫停於下焦則腹痛自利水氣犯中焦則作噦欲吐不吐水氣犯上焦則咳嗽心悸頭眩方中薑附以助真陽用苓術以制二陰水氣一收則上中下三焦俱無病矣白通加人尿豬膽汁湯蔥白四莖乾薑一兩附子炮一枚人尿五合豬膽汁一合少陰病下利脈微服白通湯後利不止厥逆無脈此為陰寒過甚陽氣將絶之候加人尿豬膽汁者以類相從之義也服後脈暴出則陽氣盡泄孤立無依故隨脫而死脈微續者陽氣漸回以次可復故得生外用蔥艾尉灸氣海關元表裡通陽亦為善策吳茱萸湯吳茱萸泡一升人參三兩大棗十二枚生薑六兩吳茱萸辛烈善降得薑之溫通用以破除陰氣有餘矣又恐辛燥太過耗氣劫陰故用人參大棗之甘緩以濟之又能補土扶陽使濁陰不得上干清道治法更為周到大建中湯蜀椒二合乾薑四兩人參二兩煎去滓內飴糖一升微煎溫服非人參不能大補心脾非薑椒不能大祛寒氣故曰大建中又有飴糖之甘緩以殺薑椒之辛燥非聖於醫者不辨有此十四味建中湯黃耆蜜炙人參白朮土炒茯苓甘草蜜炙半夏薑製當歸酒洗白芍酒炒熟地川芎麥冬肉蓯蓉附子肉桂加薑棗煎於十全大補中又加四味究竟陽藥太多若以治陰虛之勞瘠非抱薪救火乎至樂令建中湯加柴胡細辛之開透善走欲其建立中氣不亦難乎小建中湯桂枝生薑三兩芍藥六兩甘草炙一兩大棗十二枚入飴糖一升微火解服肝木太強則脾土受制脾陽不運虛則寒生陰氣日凝陽氣日削故見腸鳴泄瀉腹痛等症小建中湯之義全在抑木扶土當從吳氏之説用肉桂而不用桂枝肉桂溫里桂枝解表用各有當也且肉桂性能殺木合芍藥以制肝又用薑棗甘草飴糖之甘溫以補脾斯中州之陽氣發舒而陰寒盡退矣白朮附子湯白朮二兩甘草一兩附子炮一枚每服五錢薑五片棗一枚煎此為治腎風之藥腎為水臟得火則平而濁陰退所矣若肝風頭眩則當用養血之劑誤用此方則風火相搏而病益劇不可不知也益元湯附子炮乾薑艾葉黃連知母人參麥冬五味子甘草加薑棗蔥白煎入童便一匙冷服戴陽者陰不抱陽虛陽上浮几几欲絶若誤作熱症治立見敗壞此方用薑附艾葉以回陽用生脈散以斂陰使陽回氣復陰能抱陽可無虛脫之虞矣回陽救急湯附子炮乾薑肉桂人參五分白朮茯苓一錢半夏陳皮七分甘草二分五味子九粒加薑煎入麝三釐調服無脈加豬膽汁泄瀉加升麻黃耆嘔吐加薑汁吐涎沫加鹽炒吳茱萸此方治中寒之緩症則可若云救急則薑附中又合六君五味子反令薑附之性多所牽制不如四逆湯為能斬關奪門也四神丸破故紙酒浸一宿炒四兩五味子炒三兩肉豆蔻麵裹煨二兩吳茱萸鹽湯泡一兩用大棗百枚生薑八兩切片同煮爛去薑取棗肉搗丸每服二錢臨臥鹽湯下命門為日用之火所以薰蒸脾胃運化穀食若腎瀉者宜二神丸脾瀉者若由木旺剋土則吳茱萸能散厥陰之氣用以抑木則可非此則不如去五味子吳萸加茴香木香者之為佳也感應丸木香肉豆蔻丁香一兩五錢乾薑炮百草霜一兩杏仁一百四十粒去皮尖巴豆七十粒去心皮膜油巴豆杏仁另研同前藥末和勻用好黃蠟六兩溶化重絹濾去渣好酒一升於砂鍋內煮數沸候酒冷蠟浮用清油一兩銚內熬熟取蠟四兩同化成汁就銚內和前藥末乘熱拌勻丸如豆大每服三十丸空心薑湯下制方之法極有巧思然走者太走而澀者太澀偏師陷陳終不如堂堂正正之為得也譽之者嘆為雖有巴豆服之不瀉此不過藉蠟性為之封固耳吾不敢以為神妙也導氣湯川楝子四錢木香三錢茴香二錢吳茱萸一錢湯泡長流水煎此為治疝之通劑有川楝子苦寒濟以茴香木香吳萸之辛溫肝腎並顧寒濕盡祛至為妥善天台烏藥散烏藥木香茴香鹽炒良薑炒青皮五錢檳榔二個川楝子十個巴豆七十一粒先以巴豆微打破同川楝麩炒黑去麩及巴豆同餘藥為末酒下一錢治疝大法當溫腎柔肝兼治寒濕何至用巴豆之峻攻不及導氣湯遠矣疝氣方吳茱萸枳殼梔子山楂炒荔枝核煅等分為末空心長流水下二錢此方亦平易近人雖無近效然較之烏藥散要穩妥多矣橘核丸橘核川楝子海藻海帶昆布桃仁二兩延胡索厚朴枳實木通桂心木香五錢酒糊丸鹽湯或酒下此乃治㿗疝之專劑理氣破血軟堅行水之法俱備其知痛楚者不可誤用清暑之劑四味香薷飲香薷一兩厚朴薑汁炒扁豆炒五錢黃連薑炒三錢冷服暑濕暍三氣初學不能分別多致錯誤今為明白言之時當夏令天氣下降地氣上升人處其中暑上侵而濕下襲暑為天之氣濕乃地之氣其熱之甚者則為暍此三氣之分也今就暑病門中先論暑症雖有冒暑傷暑中暑伏暑等名不過略分輕重其為陽邪則一也其因暑而貪涼受風者便是傷風因暑而食冷受寒者便是傷寒但與冬月之傷風傷寒治法不同因暑傷風當辛涼表散因暑傷寒當於清解中參用溫藥此為正法四味香薷飲乃治感冒暑氣陽邪遏抑之劑即冬月傷風中用桂枝荊防之例今人誤以香薷為涼藥不論是何暑病首先用之殊可怪嘆清暑益氣湯黃耆一錢人參一錢白朮炒五分蒼朮一錢神麯五分炒陳皮青皮麩炒甘草炙麥冬五味子當歸酒洗黃柏酒炒澤瀉各二分升麻一錢葛根三分薑棗煎清暑益氣湯藥味龐雜補者補而消者消升者升而瀉者瀉將何所適從乎且主治下有胸滿氣促一條則黃耆升麻在所當禁豫謂此等症但須清心養胃健脾利濕足矣何必如此小題大做東垣先生豫最為服膺惟此等方不敢阿好生脈散人參麥冬五分五味子七粒肝主氣心主血生脈散養心肺之陰使氣血得以榮養一身而又有酸斂之品以收耗散之氣止汗定咳虛人無外感者暑月宜之六一散滑石六兩甘草一兩為末冷水或燈心湯調下本方加辰砂名益元散加薄荷名雞蘇散加青黛名碧玉散六一散施之於體壯熱盛濃厚太過之人則可若體虛氣弱者則寒傷脾而滑傷腎反致飲食減少津虧作渴至益元散雞蘇散碧玉散亦同此例也不可因夏月而一概混投縮脾飲砂仁草果煨去皮烏梅甘草炙四兩扁豆炒研乾葛二兩方中辛燥太過用以健脾去濕則可若謂清暑除煩止渴吾不謂然消暑丸半夏一斤醋五斤煮乾茯苓甘草半斤生用薑汁糊丸勿見生水熱湯下消暑丸不治暑而治濕使濕去而暑亦降用意甚佳然必須兼清解之藥一二味為得大順散乾薑桂杏仁去皮尖甘草等分先將甘草用白砂炒次入薑杏炒過去砂合桂為末每服二錢此即治暑月之傷寒也因暑傷寒故但治寒而不治暑利濕之劑五苓散豬苓茯苓白朮炒十八銖澤瀉一兩六銖半桂五錢濕為地之氣其中人也緩其入人也深其為病也不可以疾而已坐臥卑濕汗漬雨淋此濕之自外來者也多食濃膩過嗜茶酒此濕之自內生者也治濕必先理脾脾土健運始能滲濕此定法也又須分利使濁陰從下而出亦定法也五苓散仲景本為脈浮小便不利微熱消渴表裡有病者而設方中宜用桂枝不可用肉桂後人遂通治諸濕腹滿水飲水腫嘔逆泄瀉水寒射肺或喘或咳中暑煩渴身熱頭痛膀胱熱便祕而渴霍亂吐瀉痰飲濕症身痛身重等症總之治寒濕則宜用肉桂不宜用桂枝若重陰生陽積濕化熱便當加清利之藥並桂枝亦不可用矣至加減之附方各有宜稱亦當細細參之豬苓湯豬苓澤瀉茯苓滑石阿膠各一兩五苓散治濕濁不化故用術桂以通陽而化濁豬苓湯治陽邪入里故用滑石阿膠以降熱而存津至於統治少陰下利六七日咳而嘔渴心煩不得眠乃借瀉膀胱以清腎臟是活用之法而非正治也茯苓甘草湯茯苓桂枝二兩甘草一兩生薑二兩茯苓宜於獨重以其能滲濕安神也薑桂性溫開解腠理能逐水氣從毛竅而出用甘草以補土和中方法特妙小半夏加茯苓湯半夏一升茯苓三兩生薑半斤古人立方有藥味少而分兩重者專走一門為功甚巨如半夏等湯是也痰去則眩悸自止濕去則痞滿自消氣順則嘔吐不作矣加味腎氣丸熟地四兩茯苓三兩乳拌山藥炒丹皮酒炒山萸肉酒潤澤瀉酒浸川牛膝酒浸車前子炒肉桂一兩附子制五錢蜜丸此方之妙全在導龍歸海命腎之火衰微濁陰日漸凝結始則小便不利繼則水氣泛溢腹脹肢腫但用分利之劑徒然耗正劫陰小便仍不能利惟用附桂以直達命腎使命門之火得以熏蒸脾胃腎中之真陽發越則腎氣通暢而寒水亦行小便通則泛濫之水如衆流赴壑矣人但知水能剋火而不知火亦能制水發陽光以消陰翳此類是也越婢湯麻黃六兩石膏八兩生薑三兩甘草二兩大棗十二枚風與水在皮膚之間故但腫而脹變小青龍之制使風水俱從毛竅而出故名越婢越婢者悅脾也防己黃耆湯防己黃耆一兩白朮七錢五分甘草五錢炙每服五錢加薑棗煎去風先養血治濕先健脾此一定之法此症乃風與水相乘非血虛生風之比故但用治風逐水健脾之藥而不必加血藥但得水氣去而腠理實則風水亦不能獨留矣腎著湯乾薑炮茯苓四兩甘草炙白朮炒二兩方中但燥濕健脾而不用溫腎之藥緣此症乃積濕下注於腎非腎之寒水為病也若虛寒之體即少加附子杜仲亦可舟車丸黑牽牛四兩炒大黃二兩酒浸甘遂麵裹煨大戟麵裹煨淨芫花醋炒青皮炒橘紅一兩木香五錢輕粉一錢水丸仲景十棗湯已極峻厲此更厲而加厲縱形氣俱實豈能堪此豫謂此等症全是陰結非陽不通宜用附桂兼疏肝逐水之劑此等方法萬不可用疏鑿飲子羌活秦艽檳榔大腹皮茯苓皮椒目木通澤瀉赤小豆商陸等分加薑皮煎疏鑿飲名色甚佳用藥亦較舟車丸已輕一等然吾見服商陸者必然大瀉胸腹驟寬不逾時而復脹萬無生理蓋逐水自前陰而出者得生自後陰而出者必死學者慎之哉實脾飲白朮土炒茯苓甘草炙厚朴薑炒木香附子大腹皮草豆蔻木瓜片黑薑加薑棗煎主治條下有色悴聲短口不渴二便利數語則此症乃脾腎虛寒當用香砂六君合溫腎滲濕之劑若徒事破氣利濕色悴者不更加憔悴乎五皮飲五加皮地骨皮茯苓皮大腹皮生薑皮此亦為水邪客於皮膚而設以其病不在上故不用發汗逐水之法而但利小便也麥門冬湯麥門冬五十枚薑炒粳米五十粒麥門冬湯解之者多談玄理豫則謂初起便見喘滿則明是清肅之令不能下行故水溢高原也擬以桑白皮栝蔞皮苡仁米等代之亦未為不可羌活勝濕湯羌活獨活一錢川芎藁本防風甘草炙五分蔓荊子三分此為治在表之濕故獨用風藥關節利則濕除矣且屬外來之淺恙本不在健運分消之例中滿分消丸厚朴炒一兩枳實炒黃連炒黃芩炒半夏薑製五錢陳皮知母炒四錢澤瀉三錢茯苓砂仁二錢乾薑二錢薑黃人參白朮炒甘草炙豬苓一錢蒸餅丸焙熱服中滿分消丸解者謂治熱脹此不過脾胃失職積濕所化之熱耳並非實火也若有實火則水氣安得橫行濁陰豈得復盛乎惟其寓補脾胃之法於分消解散之中不傷元氣極為正法中滿分消湯川烏乾薑生薑黃連人參當歸澤瀉青皮麻黃蓽澄茄柴胡二錢吳茱萸草蔻仁厚朴黃耆黃柏五分益智仁木香半夏茯苓升麻三分熱服此方於大隊溫補中用黃連黃蘗所謂從權以寒熱藥下之也於中又升散又分利雖屬開鬼門潔淨府之法究竟歧路太多矣大橘皮湯滑石六錢甘草一錢赤茯苓一錢豬苓白朮土炒澤瀉桂五分陳皮一錢五分木香檳榔三分加薑煎每服五錢利小便即所以實大腸使小腸之水滲入膀胱而不入大腸則五苓散中肉桂一味尤為得力也茵陳蒿湯茵陳六兩大黃二兩酒浸梔子十四枚炒凡發黃症二便不利者用大黃若二便如常當去大黃用黃連至寒濕陰黃則又當於分利中用熱藥矣八正散車前子木通瞿麥萹蓄甘草梢梔子炒黑滑石大黃加燈草煎此方治實火下注小腸膀胱者則可若陰虛夾濕火之體便當去大黃加天冬丹參丹皮琥珀等味不可再用大黃以傷其元氣萆薢分清飲川萆薢石菖蒲烏藥益智仁等分甘草梢減半入鹽食前服凡淋症皆由於濕熱小便頻數其為腎虛夾熱可知但當於滋腎中加清利之藥若烏藥益智仁之溫澀是反行禁錮而非分清解者謂此以疏泄為禁止吾不謂然琥珀散滑石二錢琥珀木通萹蓄木香當歸鬱金炒一錢為末服上焦之熱下注小腸膀胱精道與溺道混淆故成淋症此於清利中少加氣藥以分清濁極為有法防己飲防己木通檳榔生地酒炒川芎炒白朮炒蒼朮鹽炒黃柏酒炒甘草梢犀角食前服濕熱為病不宜調補亦不宜攻下此方於健脾燥濕中寓滋陰涼血之法最為合度當歸拈痛方茵陳酒炒羌活防風升麻葛根蒼朮白朮甘草炙黃芩酒炒苦參酒炒知母酒炒當歸豬苓澤瀉空心服疏風所以勝濕健脾所以滲濕通小便所以利濕上下中三焦之濕盡去則熱亦解散而遍身之痛止矣此不治痛而痛自止之法也禹功散黑牽牛四兩茴香一兩炒為末每一錢薑汁調下此方峻猛不可輕用升陽除濕防風湯蒼朮泔浸四錢防風二錢茯苓白朮芍藥一錢薑棗煎但升陽實脾而濁陰自化尤妙在不用升麻最為的當潤燥之劑瓊玉膏地黃四斤茯苓十二兩人參六兩白蜜二斤先將地黃熬汁去渣入蜜煉稠再將參苓為末和入磁罐封水煮半日白湯化服燥者燥烈也不能滋潤也喻嘉言作涼字解豫於醫醇剩義中已詳論之如瓊玉膏之潤燥亦善策也人參地黃氣血並補金水相生又加茯苓以寧心而補土則水升火降而咳嗽自除矣炙甘草湯甘草炙四兩生薑桂枝三兩人參阿膠蛤粉炒二兩生地黃一斤麥冬去心麻仁半斤研大棗十二枚水酒各半煎內阿膠煬化服或疑薑桂之辛溫恐不可以潤燥不知此方仲景原為傷寒脈結代餘邪未解者而設故溫散與清潤並行使外邪清則正氣醒而血脈復也麥門冬湯麥門冬七升半夏一升人參三兩甘草二兩大棗十二枚粳米三合半夏之性用入溫燥藥中則燥用入清潤藥中則下氣而化痰胃氣開通逆火自降與徒用清寒者真有霄壤之別活血潤燥生津湯當歸白芍熟地一錢天冬麥冬栝蔞各八分桃仁研紅花五分生津養血本潤燥之正法但桃仁紅花雖云活血恐其破血耳清燥湯黃耆一錢五分蒼朮炒一錢白朮炒陳皮澤瀉五分人參茯苓升麻三分當歸酒洗生地麥冬甘草炙神麯炒黃柏酒炒豬苓二分柴胡黃連炒一分五味子九粒每服五錢方名清燥湯而所用之藥乃有二朮陳皮黃柏神麯等以此清燥非抱薪救火乎不知此症之要全在肺金受濕熱之邪一語蓋熱為積濕所化濕不去則熱不清徒用清滋留濕即以留熱故毅然用燥濕之品使濕去而熱亦清此其所以為清燥乎滋燥養榮湯當歸酒洗一錢生地熟地芍藥炒黃芩酒炒秦艽一錢防風甘草五分若大便風祕便可用秦艽防風若大便如常便當減去風藥善走與火鑠肺金不宜搜風順氣丸大黃九蒸九曬五兩火麻仁郁李仁去皮山藥酒蒸山茱肉車前子牛膝酒蒸二兩菟絲子酒洗獨活防風檳榔枳殼麩炒一兩蜜丸此不過因大腸祕結以之潤腸通氣耳乃本方自注久服則可百病皆除安有大黃檳榔之峻下而可以常服者乎潤腸丸大黃歸尾羌活五錢桃仁研火麻仁去殼一兩蜜丸此以通為潤非專於清潤也伏火燥結得滌蕩而始清不待潤而燥自除矣通幽湯當歸身升麻桃仁研紅花甘草炙一錢生地黃熟地五分雖云病在幽門亦無專治幽門之藥不外調和氣血開通胃府清升濁降而上下自安惟不用香燥攻下最為有識韭汁牛乳飲韭菜汁牛乳等分時時呷之韭汁祛瘀生新又能開通胃氣牛乳補血潤燥兼通大腸不用辛熱劫陰傷津洵為良法黃耆湯黃耆熟地芍藥五味子麥冬三兩天冬人參甘草三錢茯苓一兩每服三錢加烏梅薑棗煎氣血並補斂陰生津極為有力惟方既有五味不必再加烏梅消渴方黃連天花粉生地汁藕汁牛乳將黃連花粉為末調服治胃熱消渴無花粉宜重用黃連當用胡連蓋川連但能瀉心火生津止渴不如胡連之為佳也地黃飲子人參黃耆蜜炙甘草炙生地熟地天冬麥冬枇杷葉蜜炙石斛澤瀉枳殼麩炒等分每服三錢此方妙處在清金潤肺以益水之源又有澤瀉枳殼以泄鬱熱斯渴止而煩躁亦除矣白茯苓丸茯苓黃連花粉萆薢熟地人參覆盆子玄參一兩石斛蛇床子七錢五分雞䏶胵三十具蜜丸磁石湯送下金水俱傷方成下消蛇床子燥烈如火萬不可用即雞䏶胵之消導磁石之鎮墜皆非此症所宜桑白皮等汁十味煎桑白皮一斤地骨皮三斤合煎生地汁五升麥冬汁二升生葛根汁竹瀝三升生薑汁白蜜一升棗膏一升牛酥三合頗有清肺化痰除熱止咳之力但久虛者恐其滑腸或再加茯苓懷藥苡仁等培土正以生金也治久嗽方白蜜二斤生薑二斤取汁先稱銅銚知斤兩訖納蜜薑汁微火熬令薑汁盡惟有蜜斤兩在則止每含如棗大一丸日三服肺有伏寒久咳不止者可用若陰虛者不宜豬膏酒豬脂薑汁各二升熬取三升再入酒酒五合分三服不過有此一法耳若欲以此取效吾恐其不能也麻仁蘇子粥火麻仁紫蘇子等分洗淨合研再用水研取汁煮粥啜氣血虧虛不可通利惟此潤導之法最宜
