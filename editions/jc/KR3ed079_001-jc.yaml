body:
  text: 卷一補養之劑六味地黃丸地黃砂仁酒拌九蒸九曬八兩山茱肉酒潤山藥四兩茯苓乳拌丹皮澤瀉三兩蜜丸此方非但治肝腎不足實三陰並治之劑有熟地之膩補腎水即有澤瀉之宣泄腎濁以濟之有萸肉之溫澀肝經即有丹皮之清瀉肝火以佐之有山藥收攝脾經即有茯苓之淡滲脾濕以和之藥止六味而大開大合三陰並治洵補方之正鵠也附桂八味丸熟地八兩山茱肉四兩山藥四兩茯苓三兩丹皮三兩澤瀉三兩附子一兩肉桂一兩蜜丸附桂八味為治命腎虛寒之正藥亦導龍歸海之妙法然虛陽上浮火無所附者必於脈象細參或脈洪大而重按甚弱或寸關洪大而兩尺獨虛細者宜之否則抱薪救火必成燎原之勢矣知柏八味丸大熟地八兩山茱肉四兩山藥四兩茯苓三兩澤瀉三兩牡丹皮三兩知母二兩黃柏二兩蜜丸知柏八味雖云壯水制火究竟苦寒太過徒傷胃氣水亦無以滋生不如用介類潛陽生精益髓之法為妥或腎有邪火強陽不萎等症可以暫用七寶美髯丹何首烏赤白各一斤去皮切片黑豆拌九蒸九曬白茯苓乳拌半斤牛膝酒浸同首烏第七次蒸至第九次當歸酒洗枸杞酒蒸菟絲子酒浸蒸各半斤破故紙黑芝麻同拌炒四兩蜜丸此溫補命腎兼攝納下元之劑地黃補腎中之陰首烏補腎中之陽各為君藥不可合併用各有當也還少丹熟地二兩山藥一兩五錢牛膝酒浸一兩五錢枸杞酒浸兩半山茱肉茯苓乳拌杜仲薑汁炒遠志去心楮實酒蒸五味子炒小茴香炒巴戟天酒浸肉蓯蓉酒浸各一兩石菖蒲五錢加棗肉蜜丸此方以溫補脾腎為主參以潤肺金而通山澤用意極佳微嫌遠志菖蒲二味開透太過與羸乏盜汗等症不宜不如酌用丹參柏仁之類為妥黑地黃丸蒼朮酒浸熟地黃一斤五味子半斤乾薑春冬一兩秋七錢夏五錢棗肉蜜丸此方去脾濕潤腎燥極為老潔然濕勝者為宜血虛者尚宜酌量加減虎潛丸黃柏鹽酒炒半斤知母鹽酒炒三兩熟地黃三兩虎脛骨酥炙一兩龜板酥炙四兩鎖陽酒潤當歸酒洗一兩五錢牛膝酒蒸白芍酒炒陳皮鹽水潤二兩羯羊肉酒煮爛搗丸冬加乾薑一兩虎潛丸息肝腎之虛風風從虎虎潛則風息也惟知柏苦寒用以泄腎經之邪火則可若謂補腎滋陰則予不以為是不如用枸菟等類為佳天真丸精羊肉七斤去筋膜脂皮批開入下藥末肉蓯蓉山藥各十兩當歸酒洗十二兩天冬一斤為末安羊肉內縛定用無灰酒四瓶煮令酒干入水二斗煮爛再入後藥黃耆五兩人參三兩白朮二兩為末糯米飲作餅焙乾和丸溫酒下此用血肉有情之品以形補形喜其不用地黃之滋膩平調營衛而不礙脾胃故極為妥善三才封髓丹天門冬熟地黃各二兩人參一兩黃柏酒炒三兩砂仁一兩五錢甘草炙七錢五分麵糊丸用蓯蓉五錢切片酒一大盞浸一宿煎湯送下此方治龍雷之火不安夢遺走泄則可若腎氣久虛精宮不固者豈得再用苦寒斷宜補腎納氣之法為是大造丸紫河車一具敗龜板二兩童便浸三日酥炙黃黃柏鹽酒炒杜仲酥炙各一兩五錢牛膝酒浸天冬去心麥冬去心人參各一兩地黃二兩茯苓砂仁六錢同煮去之夏加五味子五錢酒煮米糊丸女人去龜板加當歸二兩乳煮糊丸方中用茯苓砂仁二味制地黃最佳但恐黃柏苦寒傷損脾胃漸致食少溏泄則金氣更傷此不可以不慮也不如減去為佳補天丸紫河車一具黃柏酒炒龜板酥炙三兩南杜仲薑汁炒牛膝酒浸一兩陳皮一兩冬加乾薑五錢夏加炒五味子一兩酒糊為丸河車為生人造命之原用之以補先天並非假後天以濟先天也加減之法頗佳但黃柏宜除去人參固本丸人參二兩天冬炒麥冬炒生地熟地四兩蜜丸此方治火旺剋金者為宜若脾胃虛弱宜參用培土生金之法參乳丸人參末人乳粉等分蜜丸平補氣血一壯水之源一益氣之主後人兩儀膏從此化出天王補心丹生地四兩酒洗人參玄參炒丹參炒茯苓一用茯神桔梗遠志炒各五錢酸棗仁炒柏子仁炒研去油天冬炒麥冬炒當歸酒洗五味子炒各一兩蜜丸彈子大硃砂為衣一方有石菖蒲四錢無五味子一方有甘草此方原為心血不足怔忡健忘等症而設故收斂之藥不嫌太重有桔梗載藥上浮遠志開通心氣二味已足減去石菖蒲者為是否則開泄太猛非虛人所宜也孔聖枕中丹敗龜板酥炙龍骨研末入雞腹煮一宿遠志九節菖蒲各等分為末每服酒調一錢體壯氣濁痰多者可服若體氣不甚強者加當歸芍丹參柏仁等方可久服大補陰丸黃柏鹽酒炒知母鹽水炒四兩熟地酒蒸敗龜板酥炙六兩豬脊髓和蜜丸此治陰火熾盛以致厥逆者則可至內傷虛熱則斷不可用滋腎丸又名通關丸黃柏酒炒二兩知母酒炒一兩肉桂一錢蜜丸坎之為象一陽居二陰之中故真陽奠安而不妄動腎水大虧不能制火飛龍上亢故喘急而小便秘此方用知柏以象二陰用肉桂以象一陽仍取坎卦之義以通生化之原意義極精非尋常導龍歸海法也斑龍丸鹿角膠鹿角霜菟絲子柏子仁熟地黃等分為末酒化膠為丸一方加補骨脂一方加鹿茸肉蓯蓉陽起石附子黃耆當歸棗仁辰砂鹿角菟絲陰中之陽也地黃陰中之陰也用以補腎不偏不倚若加入陽起石辰砂等燥烈之品則劫陰耗氣全失立方之旨矣龜鹿二仙膏鹿角十斤龜板五斤枸杞二斤人參一斤先將鹿角龜板鋸截刮淨水浸桑火熬煉成膠再將人參枸杞熬膏和入每晨酒服三錢峻補氣血不寒不燥又能益髓固精誠補方中最妙者也補火丸石硫黃一斤豬大腸二尺將硫黃為末實豬腸中煮爛三時取出去皮蒸餅為丸如梧子大每服十丸硫黃一味道家尊之為金液蓋以硫黃為火之精其性純陽丹經云陰氣一分不盡不仙故學仙者欲絕陰以歸純陽必煉絕陰丹服之以破除陰氣此道家燒煉之方非尋常可用之藥嘗見士大夫功成名就妄想長生燒煉硫黃辰砂等物按時服食乃服之日久無不腹脹面青腸胃崩裂而死可不戒哉若寒疫陰厥猝急之時當病投之功效大而且速又非尋常溫通之藥所能及學者宜善用之唐鄭相國方破故紙十兩酒蒸為末胡桃肉二十兩去皮爛研蜜調如飴每晨酒服一大匙不能飲者熱水調忌蕓薹羊肉本方加杜仲一斤生薑炒蒜四兩名青娥丸本方加杜仲胡蘆巴小茴香萆薢名喝起丸喘與咳由於痰隨氣升腰腳痛由於氣不納腎方中二味溫腎納氣則喘咳自平腰腳自強矣青娥喝起二方亦俱有意義二至丸冬青子即女貞實冬至日採不拘多少陰乾蜜酒拌蒸過一宿粗皮擦去曬乾為末旱蓮草夏至日採不拘多少搗汁熬膏和前藥為丸臨臥酒服一方加桑椹子為丸或熬膏和入二至丸取意甚佳尚嫌力量淺薄加入天冬地黃人參以三才合二至始為得力扶桑丸嫩桑葉去蒂洗淨曬乾一斤為末巨勝子即黑脂麻淘淨四兩將脂麻擂碎熬汁和蜜煉至滴水成珠入桑葉末為丸此即世所謂桑麻丸也去風明目烏髭黑髮頗為有功至稱駐顏益壽則譽之太過殊為失實矣參苓白朮散人參白朮土炒茯苓甘草炒山藥各二斤陳皮扁豆炒一斤半薏仁炒一斤砂仁一斤桔梗一斤蓮肉炒去心一斤為末每三錢棗湯或米飲調服此健脾和胃之正藥也惟扁豆性劣宜減去嘗見瘧愈之後服扁豆者無不復發此可知也妙香散山藥薑汁炒二兩人參黃耆遠志炒茯神茯苓一兩桔梗三錢甘草二錢木香二錢五分麝香一錢辰砂二錢另研為末每服二錢酒下此方頗有作意但參耆之固終不敵麝香之開誠恐耗散心氣神不能藏君火不安相火亦動以之開解驚悸鬱結則有餘以治夢遺失精則不足不如減去加沉香琥珀等為佳玉屏風散黃耆炙防風一兩白朮炒二兩為末每服三錢此固表去風藥用以實表則可若云加減即可代桂枝麻黃等湯則表實而邪無出路斷斷不可此等議論誤人不淺必不可從四君子湯人參白朮土炒茯苓二錢甘草一錢姜三片棗二枚煎本方加陳皮名異功散再加半夏名橘半六君子湯本方加木香藿香乾葛名七味白朮散本方除人參加白芍名三白湯本方合四物名八珍湯又加黃耆肉桂名十全大補湯四君子湯中正和平為補方中之金科玉律至加減有法者如異功散之理氣橘半六君之去痰香砂六君之溫胃加竹瀝薑汁之治半身不遂七味白朮散之去熱治瀉均極妥善三白湯治內傷尚可若謂治外感亦為奇方則吾不信也至於合四物為八珍增黃耆肉桂為十全大補用各有當皆不可磨滅之良方也升陽益胃湯黃耆二兩人參甘草炙半夏一兩脈澀者用白芍炒羌活獨活防風五錢陳皮四錢白朮土炒茯苓澤瀉柴胡三錢黃連二錢薑棗煎東垣論飢飽勞役陽陷入陰面黃氣弱發熱者當升舉陽氣以甘溫治之此真卓識確論為治陽虛發熱者開一大法門惟方中輒用升柴恐上實下虛者更加喘滿在東垣必能明辨當病而投後人若執定此法一概施之則誤人不淺矣補脾胃瀉陰火升陽湯黃耆蒼朮泔浸炒甘草炙羌活一兩升麻八錢柴胡一兩五錢黃連酒炒五錢黃芩炒人參七錢石膏少許每服三錢或五錢東垣十書予最為服膺以其重脾胃為正法眼藏也如此方中升柴黃連黃芩石膏等皆非可輕投後人但師其意不泥其方可耳補肺湯人參黃耆蜜炙五味子炒紫菀一錢桑白皮蜜炙熟地二錢入蜜少許和服此方但為肺氣久虛以致咳嗽而設其他咳嗽之症不一而足不可混施方中有補有瀉用意亦佳但桑皮紫菀之薄弱豈能敵參耆熟地之滯膩獨不慮助痰為病乎至謂熟地壯水免得子盜母氣則可謂為化痰之妙品則佐使正未合也百合固金湯生地黃一錢熟地黃三錢麥冬一錢五分百合當歸貝母芍藥炒生甘草一錢玄參桔梗八分此方金水相生又兼養血治肺傷咽痛失血者最宜李士材謂清金之後急宜顧母識解尤卓予謂咽痛一定急當培土生金也紫菀湯紫菀洗淨炒阿膠蛤粉炒知母貝母二錢桔梗人參茯苓甘草五分五味子十二粒此方治氣極久咳失血極佳若肺癰便當去五味子以肺氣壅塞成癰不宜收斂也秦艽扶羸湯柴胡二錢秦艽人參當歸鱉甲炙地骨皮錢半紫菀半夏甘草炙一錢薑棗煎所載見症乃陰陽兩虛碎金不鳴之候並無表症且體虛自汗元氣更傷柴胡秦艽半夏生薑乃辛散之品重傷其陰吾恐危亡隨之矣黃耆鱉甲散黃耆蜜炙鱉甲炙天冬五錢秦艽柴胡地骨皮三錢桑白皮紫菀半夏二錢五分茯苓三錢芍藥生地黃知母甘草炙三錢五分人參桔梗肉桂一錢五分姜煎此方過於繁雜不足法也秦艽鱉甲散鱉甲炙一兩秦艽知母當歸柴胡地骨皮一兩烏梅一個青蒿五葉風為天之氣中人最速鬱而為熱固當清散但深入骨里者千萬中無一二蓋骨蒸乃陰虛非外風在骨也益氣聰明湯黃耆人參五錢葛根蔓荊子三錢白芍黃柏二錢如有熱煩亂春月漸加交夏倍之如脾虛去之熱淋少用升麻錢半炙甘草一錢臨臥服此方重脾胃而兼治肝腎立意最精但升麻似乎過重酌減其半亦可以升清開竅矣羊肉湯當歸白芍牡蠣煅一兩龍骨煅五錢生薑二兩附子炮二兩桂枝七錢五分每服一兩羊肉四兩加蔥白煮服此方斂陰生陽補虛固脫色色周到洵為佳制發表之劑麻黃湯麻黃去節三兩桂枝二兩杏仁七十枚去皮尖甘草一兩炙用先煮麻黃數沸去沫內諸藥煎熱服覆取微汗中病即止不必盡劑仲景立方之祖醫中之聖也所著傷寒金匱諸書言言典要為後人度盡金針即如傷寒太陽一症頭緒最繁有風傷衛者有寒傷營者有風寒兩傷營衛者不得其解無所措手今觀其用桂枝湯治風傷衛用麻黃湯治寒傷營大青龍湯治風寒兩傷營衛劈分三項開三大法門後人察脈辨症謹守成規庶不至於僨事但仲景本為隨受隨發冬月之正傷寒而設非可以此法混施於春溫溫疫等症後人不明此理一概混投誤人實多於是辨論者紛紛而起遂將溫症寒症糾纏不已愈辨愈明者固多愈辨愈晦者亦不少予則以為春溫歸春溫溫疫歸溫疫傷寒歸傷寒各分門類劃然瞭然不必互相引證反使人多所惶惑也桂枝湯桂枝芍藥生薑三兩甘草三兩炙大棗十二枚此治風傷衛解表之輕劑也加減之法最多細看注中之方凡仲景所加減者無不絲絲入扣至後人之法亦盡有可用但須細心參酌因症而施始為得之大青龍湯麻黃六兩桂枝甘草二兩炙杏仁四十枚去皮尖石膏一塊如雞子大生薑三兩大棗十二枚此為風寒兩傷營衛而設即麻黃湯加石膏薑棗也麻黃湯中本用桂枝可見仲景治寒未嘗不兼治風則風寒兩傷營衛者用麻黃湯亦足矣而必加石膏等三味者蓋因風寒兩傷營衛非但傷風傷寒之可比鬱熱必倍加故用石膏體重味輕以瀉鬱熱薑棗甘溫以反佐之仲景之意全重在煩躁二字若無此候萬不可輕投小青龍湯麻黃去節桂枝芍藥酒炒細辛甘草炙乾薑三兩半夏五味子半升此方全為外有風內蓄水而設所以不用石膏者因水停胃中不得復用石膏以益胃之寒故一變而為辛散外去風而內行水亦名曰青龍者亦取發汗天氣下為雨之義也葛根湯葛根四兩麻黃生薑三兩桂枝芍藥甘草二兩炙大棗十二枚太陽症無汗宜用麻黃湯矣乃變其法於桂枝湯中加葛根麻黃二味此中奧義全在惡風二字但惡風而不惡寒則不在寒傷營之例乃太陽表症未解將入陽明之象故用麻黃以發汗桂枝以去風參用葛根以阻其入陽明之路若拋荒本經之病而預用引經之藥便為開門揖盜仲景斷不為也麻黃附子細辛湯麻黃細辛二兩附子一枚炮此症機竅全在反發熱脈沉五字蓋太陽之邪初傳少陰故脈症如此方中用細辛附子溫腎以捍衛本經格外來之邪不使深入用麻黃以散太陽之邪使之仍從原路而出只此三味而治法之妙如此非仲景其孰能之升麻葛根湯升麻三錢葛根芍藥二錢甘草一錢炙加姜煎此方用升麻葛根以升散陽明又恐升提太過致人喘滿故用芍藥甘草酸收甘緩以佐之究竟互相牽制不如獨用葛根為君加牛蒡連翹桔梗薄荷等斑疹時疫則加馬勃青黛等未為不可也柴葛解肌湯柴胡葛根各三錢羌活一錢白芷一錢黃芩三錢芍藥桔梗甘草各一錢加姜三片棗二枚石膏一錢煎服此證無脅痛耳聾之象與少陽無涉乃首用柴胡開門揖盜一忌也大青龍湯用石膏全為煩躁而設輒用石膏以傷胃氣二忌也此方斷不可用柴胡升麻湯柴胡前胡黃芩六錢升麻五錢桑皮四錢葛根四錢荊芥七錢赤芍石膏一兩加姜三片豉二十粒煎升麻之為物用以治天行癘疫化毒消斑則可尋常陽明症中不可輕用且用石膏為君意在清肺胃耳獨不慮寒胃太過其變更不可問乎九味羌活湯羌活防風蒼朮一錢五分細辛五分川芎白芷生地黃芩甘草一錢加生薑蔥白煎此方用以代麻桂等湯實為穩妥但地黃滋膩太過不如仍用桂枝湯中之芍藥斂陰而不滋膩也至其辛散燥烈陰虛氣弱者忌用則固自言之矣十神湯麻黃四兩葛根十四兩升麻川芎白芷紫蘇甘草陳皮香附赤芍各四兩每服三錢加姜五片蔥三莖煎時邪瘟疫天行之癘氣也故此方於升散中多用芳香闢穢之品辛烈善走雖有芍藥甘草不能制之不可作陽經外感之通劑用也神朮散蒼朮制防風二兩甘草炙一兩加薑蔥煎本方除蒼朮加白朮二兩不用蔥名白朮湯神術白朮二方乃治寒傷脾胃濕淫於裡之妙法夾有外感受寒無汗者加蔥白受風有汗者去蔥白動有法度正不必謂其可代麻黃桂枝二法也太無神朮散蒼朮泔浸厚朴薑汁炒各一錢陳皮二錢甘草炙藿香石菖蒲各一錢五分太無神朮散乃正本清源之要義惟石菖蒲一錢五分開泄太過宜酌減也蔥豉湯蔥白一握豉一升解表通陽最為妥善勿以其輕淡而忽之人參敗毒散人參羌活獨活柴胡前胡川芎枳殼桔梗茯苓一兩甘草五錢每服一兩加姜三片薄荷少許煎此不過尋常固本治標法耳用之於虛人感冒則可若表裡俱實則不增劇為幸尚望病之輕減乎傷寒用人參仲景本有成法並非以人參助元氣為驅邪之主也嵐瘴則濕毒為多亦非感冒可比至疫癘之氣中人更烈陽毒則有發熱煩躁斑疹等症陰毒則有面青腹痛下利等症若用此方治陽毒既無清火解邪之功以之治陰毒又無回陽急救之力均未見其可予於喻西江先生最為服膺豈敢輕議但謂表藥中有用人參之法則可若謂表藥中用人參更為得力則不敢阿私所好也川芎茶調散薄荷八錢川芎荊芥四錢羌活白芷甘草炙一錢防風錢五分細辛一錢每三錢食後茶調服輕揚解表三陽並治兼用細辛並能散寒惟虛人宜去此一味蓋細辛善走誠恐重門洞開反引三陽之邪內犯少陰此不可以不慮也再造散人參黃耆桂枝甘草附子炮細辛羌活防風川芎煨姜棗此方但可施於常時之不能作汗者若在冬月而脈見浮緊便是太陽之寒傷營此方斷不可用注中又引東垣丹溪治虛人感冒多用補中益氣加表藥予不以為然蓋親見喜用升柴者殺人無數故不得不加意慎重非偏執己見不喜升柴實不敢泥紙上之成方誤目前之人命也大羌活湯羌活獨活防風細辛防己黃芩黃連蒼朮白朮甘草炙三錢生地黃知母川芎一兩每服五錢熱飲兩感傷寒一日太陽少陰二日陽明太陰三日少陽厥陰古方俱有加減治法但予意更有進者若至二日而前症未解則是四經合病三日而前症未解則是六經俱病矣四經合病者既未有成方而六經俱病者更難於措手仲景以後豈復有補天浴日手段大羌活湯漫無分別亦不過盡人事而已桂枝羌活湯桂枝羌活防風甘草等分每服五錢瘧發在處暑前宜從時瘧治且內經只分邪在肌表在衛在營初無六經之說更不可仿傷寒之例湧吐之劑瓜蒂散甜瓜蒂炒黃赤小豆共為末熱水或酸齏水調下高者因而越之經有明訓即吐法也後人視為畏途久置不講殊不知痰涎在胸膈之間消之匪易因其火氣上衝之勢加以吐法使傾筐倒篋而出之則用力少而成功多瓜蒂散之類是也且吐必有汗故並可治風治黃惟注中食填太陰欲吐不出二語須與申明蓋飲食必先入胃食填太陰者非既出胃而入脾也乃胃氣窒塞使脾氣不通耳又必新入之食尚為完穀故可用吐若經宿之後將為燥糞滯於胃中便宜攻下豈可尚用吐法乎參蘆散人參蘆研為末水調下一二錢或加竹瀝和服化痰清火頗為平穩但用以湧吐恐力尚不逮也梔子豉湯梔子十四枚淡豉四合服令微吐注中治傷寒汗吐下後虛煩不眠懊憹身熱等症汗吐下後一語宜善體會蓋言或汗後肌表雖解而裡熱未除或吐後痰氣雖平而陽邪未去或下後里滯雖退而表邪未清乃指一節而言並非謂三法並用之後也今人死煞句下往往誤認三法並施雖有壯夫豈能堪此且三法並用之後豈尚有餘邪未清者乎不參活句謬以千里矣仲景用梔子令上焦之熱邪委宛而下用豆豉以開解肌理真超凡入聖之方其各種加減之法亦俱有精義不得草草讀過稀涎散皂角四挺去皮弦炙白礬一兩共為末溫水調下五分或加藜蘆治上焦用湧吐之法此義本之內經而方則出於仲景古人體氣壯實不妨用之後世機心日開嗜欲日甚元氣大傷稟受甚薄一經湧吐汗而且喘百變叢生後人不敢輕用蓋亦慎重之道即如稀涎散性最猛烈用以救猝急痰症方足以斬關奪門然尚有醒後緩投藥餌痰不可盡攻之戒可知虛人及尋常之症不可輕用吐法也乾霍亂吐方燒鹽熱童便三飲而三吐之痧症至元而始著元以前但有霍亂之名無所謂痧症也欲吐不得欲瀉不得陰陽顛倒氣閉血凝症極危險故不可進藥餌穀食燒鹽童便以吐之是也然必須外用針刺人中少商委中舌尖等處再用手揉其穴令血能多出則毛竅方開而氣始得漸達或用香附末廣艾炒溫熨臍之四旁亦佳攻裡之劑大承氣湯大黃四兩酒洗芒硝三合枳實五枚厚朴半斤先煎樸實將熟內大黃煮二三沸傾碗內和芒硝服攻下之法原因實症俱備危在旦夕失此不下不可復救故用斬關奪門之法定難於俄頃之間仲景所以有急下存陰之訓也乃後人不明此義有謂於攻下藥中兼行生津潤導之法則存陰之力更強殊不知一用生津滋潤之藥則互相牽制而盪滌之力輕矣此譬如寇盜當前恣其焚掠所過為墟一旦聚而殲之然後人得安居而元氣可以漸復是去實可以保陰乃相因之理方得存字真解並非謂攻實即是補陰並可於攻下中寓養陰法也仲景制大承氣湯用枳實開上焦用厚朴通中焦芒硝理下焦而以大黃之善走者統率之以盪滌三焦之堅實正聚寇盡殲之大法而又恐藥力太猛非可輕投故又有欲用大承氣先與小承氣之訓夫以仲景之神靈豈尚待於先試實恐後人審症未確藉口成法孟浪輕投不得不諄諄告誡此實慎重民命之婆心也至於三陰多可下之症三陽惟正陽明可下少陽必不可下而陽明中夾有太陽少陽症者亦斷不可下惟太陽症脈緊惡寒無汗腹痛者乃陰氣凝結營分亦可用溫用下細看方書宜下忌下之條慎重斟酌始為得之小承氣湯大黃四兩厚朴二兩枳實三枚麩炒此治邪在中上兩焦之正法也注中但有譫語潮熱喘滿等症而無腹脹堅滿之象故減去芒硝不使伐無病之地以劫陰略一加減必有精義規矩方圓之至也調胃承氣湯大黃酒浸芒硝一兩甘草炙五錢少少溫服此治邪在中下焦之正法也注中惡熱口渴腹滿中焦燥實數語最宜著眼可見病在脾胃全與上焦無涉若雜入枳樸以犯上焦則下焦之濁氣必隨感而上反致喘逆者有之矣去枳樸加甘草使之專入脾胃而又緩芒黃善走之烈謹慎周詳毫髮無憾大陷胸湯大黃二兩芒硝一升甘遂一錢為末先煮大黃去滓內芒硝煮一二沸內甘遂末溫服傷寒下之早則反為結胸蓋緣邪尚未入陽明若先下之則邪未去而徒傷胃氣邪反得乘虛入胃而為結胸或熱勝寒勝痰勝濕勝諸瀉心湯參酌用之最為妥善此症仲景用瀉心承氣諸法而用大陷胸湯者因三焦俱實而又有水氣故不得不改用此方觀注中日晡潮熱從心至小腹鞕滿痛不可近只此一症與此方確對蓋誤下之後胃氣雖虛而邪入胃中則正經所謂邪往從之虛處轉實故藥雖極峻不犯虛虛之戒至前後兩條有云或重汗而復下之不大便五六日舌上燥渴此則津液大傷近於陽結又云或無大熱但頭微汗出脈沉為水結胸則近於陰結此二條似不堪此峻劑矣丹溪亦微有不滿之意後人自當以慎重為宜小陷胸湯黃連一兩半夏半升栝蔞一枚小陷胸湯非但治小結胸並可通治夾滯時邪不重不輕最為適用大陷胸丸大黃八兩芒硝葶藶炒杏仁去皮尖各半升合研取如彈丸一枚別搗甘遂末一錢白蜜二合煮服變湯為丸加葶藶杏仁以泄肺氣是專為上焦喘滿而設十棗湯芫花炒甘遂大戟等分大棗十枚先煮棗去滓內前藥末或棗肉為丸十棗湯乃逐水之峻劑非大實者不可輕試至河間之三花神祐丸除大棗而加大黃黑醜已是一味峻猛不復留脾胃之餘地更加輕粉則元氣搜刮殆盡病雖盡去而人亦隨亡可知仲景以十棗命名全賴大棗之甘緩以救脾胃方成節制之師也三物備急丸巴豆霜大黃乾薑等分蜜丸此不過猝急備用方耳姑存之以備一法硇砂丸硇砂巴豆去油三稜乾薑白芷五錢木香青皮胡椒二錢五分大黃乾漆炒一兩檳榔肉豆蔻一個為末釅醋二升煮巴豆五七沸再下三稜大黃末同煎五七沸入硇砂熬成膏和諸藥杵丸綠豆大每五丸薑湯下凡積聚之成多由陽虛氣弱陽分虛則不能化濁而陰氣日凝氣分弱則不能和營而血脈閉塞種種積聚由此而成施治之法當以通陽理氣為第一義若但用攻劫峻劑吾見其立敗也木香檳榔丸木香檳榔青皮醋炒陳皮去白枳殼炒黃柏酒炒黃連茱萸湯炒三稜醋煮莪朮醋煮五錢大黃酒浸一兩香附黑牽牛二兩芒硝水丸一方加當歸酒洗此較硇砂丸已從輕減但峻烈之品尚多試問病退之後元氣尚存幾許即有加當歸一味一潤而十攻豈尚能有濟乎此等方法注中原載施壯實之人究竟壯實之人患此症者絕少大抵皆脾虛氣弱者多斷不可藉口於經驗之方而任意輕投也枳實導滯丸大黃一兩枳實麩炒黃芩酒炒黃連酒炒神麯炒五錢白朮土炒茯苓二錢澤瀉三錢蒸餅為丸治濕熱蘊結腹痛泄瀉頗為得力但黃芩黃連尚在可減之律恐苦寒太過反傷中上二焦也倒倉法黃牡牛肉肥嫩者二三十斤切碎洗淨用長流水桑柴火煮糜爛濾去渣取淨汁再入鍋中文武火熬至琥珀色則成矣擇一靜室明快不通風者令病人先一夜不食坐其中每飲一鍾少時又飲積數十鍾病在上者必吐病在下者必利病在中者吐而且利視所出物可盡病根乃止吐利後必渴不得與湯其小便必長取以飲之名輪迴湯非惟止渴兼滌余垢行後解退倦臥覺飢先與米飲次與稀粥三日後漸進厚粥軟飯戒牛肉數年倒倉法乃實脾之法也牛性屬土最能補脾脾氣實則中州之轉輸利便而垢滯無所容留故在上者迫之仍從上出在下者迫之仍從下出正盛邪消理固然也蜜煎導法蜂蜜用銅器微火熬頻攪勿令焦候凝如飴捻作挺子頭銳如指摻皂角末少許乘熱納穀道中用手抱住欲大便時去之陰液虧損魄門燥結故以此潤之豬膽導法豬膽一枚取汁入醋少許用竹筒長三四寸以下半納穀道中將膽汁灌入肛中頃當大便膽汁苦寒瀉火而潤燥故熱結便秘者宜之表裡之劑大柴胡湯柴胡八兩半夏半升黃芩芍藥三兩生薑五兩大棗十二枚枳實四枚大黃酒浸二兩大柴胡為發表攻裡之劑可見表症未解雖里症甚急不宜專於攻下置表症於不問也然究竟攻裡之力倍於解表從此可悟立方之法當相其緩急輕重而投之則不拘成法中自然處處合法矣柴胡加芒硝湯小柴胡湯加芒硝六兩傷寒再傳少陽之症未解胃中又有實熱故用芒硝以蕩其餘波較大柴胡為輕減矣桂枝加大黃湯桂枝湯加大黃一兩芍藥三兩太陽誤下不專屬胃而入於脾故仍用桂枝以解太陽之邪加大黃以去太陰之實水解散麻黃四兩桂心甘草炙白芍二兩大黃黃芩三兩瘟疫有直中而無傳經初起便有數經合病者故發表攻裡不嫌太早也防風通聖散防風荊芥連翹麻黃薄荷川芎當歸白朮白芍炒山梔炒黑大黃酒浸芒硝五錢黃芩石膏桔梗一兩甘草二兩滑石三兩加生薑蔥白煎雖云通治一切內外諸邪然必如注中表里三焦俱實者方可用否則硝黃之峻烈石膏滑石之沉寒尋常之症豈能堪此雙解散已除去大黃芒硝而石膏滑石二味予意尚以為過當不如一併除去加木通青皮二味為妥也至祛風至寶丹則為治中風之善劑矣葛根黃連黃芩湯葛根半斤甘草炙黃芩二兩黃連二兩太陽誤下熱入陽明故於解表中清陽明之熱以止利三黃石膏湯石膏一兩五錢黃芩黃連黃柏七錢梔子二十個麻黃淡豉二合每服一兩姜三片棗二枚細茶一撮煎服三焦鬱熱毒火熾盛非三黃石膏不足以祛之尤妙在麻黃豆豉開解肌表使鬱火通行此正如清風滌煩非發風助火也五積散白芷陳皮厚朴六分當歸川芎芍藥茯苓桔梗八分蒼朮枳殼七分半夏麻黃四分乾薑肉桂重表者用桂枝甘草三分加薑蔥煎仲景治傷寒發表則麻黃桂枝溫中則乾薑附子簡當的確開後學無限法門此方不過發表溫中耳而藥味繁多通治五積豈有一人之身五積咸備而尚能有活者乎若其人只有一積或多則二積豈可以五積並治者治之乎後人於本方再合人參敗毒散名曰五積交加散則更不解所謂矣麻黃白朮湯青皮陳皮黃連酒炒黃柏酒炒甘草炙升麻二分柴胡桂枝人參黃耆厚朴蒼朮泔浸白朮土炒豬苓三分茯苓澤瀉吳萸四分白蔻炒曲各五分麻黃不去節六分杏仁四粒分二服藥須對症而發見一症治一症合病則合治之並病則並治之如是而已未聞可以六經通治也方中藥有二十二味補散溫涼一齊用到即如升柴麻桂等豈不與喘促無力相妨乎黃連黃柏等豈不與臍有動氣小腹急痛相戾乎不謂東垣老人亦有此等方何況自檜以下參蘇飲人參紫蘇乾葛前胡半夏薑汁炒茯苓七錢五分陳皮去白甘草枳殼麩炒桔梗木香二錢每五錢加薑棗煎補散兼行風痰並解當病即止不為過量制方最佳香蘇飲香附炒紫蘇二錢陳皮去白一錢甘草七分加薑蔥煎外疏風而內行氣正以輕鬆流利為佳不必動輒峻劑也茵陳丸茵陳梔子鱉甲芒硝二兩大黃五兩常山杏仁炒三兩巴豆一兩去心皮炒豆豉五合蜜丸天行厲氣取效每有不可以常理論者至痎瘧及赤白痢自有正法治之何必冒險以冀幸汪訒庵反以為佳方吾不解也
