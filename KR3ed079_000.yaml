front:
  text: 序欲救人而學醫則可欲謀利而學醫則不可我若有疾望醫之救我者何如我之父母妻子有疾望醫之相救者何如易地以觀則利心自澹矣利心澹則良心現良心現斯畏心生平時讀書必且研以小心也臨症施治不敢掉以輕心也夫而後以局外之身引而進之局內而痛癢相關矣故醫雖小道而所繫甚重略一舉手人之生死因之可不儆懼乎哉近年以來疊遭兵火老成多半凋殘學醫者紛紛日起吾恐其無有師承而果於自用也故於拙刻醫醇剩義中先標一醇字此非不求有功但求無過之謂若僅如是淺陋而已矣庸劣而已矣何足以言醇乎吾之所謂醇者在義理之的當而不在藥味之新奇如仲景三承氣湯頗為峻猛而能救人於存亡危急之時其峻也正其醇也此吾之所謂醇也夫學難躐等而法有正宗初學者此法成就者亦此法先後共此一途行遠自邇不惑於他歧如是而已矣第書籍散失學者難於博觀而約取之鄉曲之士每以醫方集解一書奉為枕秘甫經臨症輒檢用之殊不知集中可用之方固多而不可用者亦不少漫無別擇草菅人命矣茲於所集各方之後逐加評論蓋欲為初學定範圍非敢為高明下針砭也且欲學者澹其謀利之欲發其救人之心猶前志云同治四年十月武進費伯雄晉卿甫題於古延陵之寓齋
  hash: sha256:27e6db08d6d9958560c2d3d126d01bf4286cf5cab76391418b31d71400b8d4e2
