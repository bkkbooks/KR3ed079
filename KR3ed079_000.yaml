body:
  text: 發凡一是編專為初學而設但取醫方集解所選之方逐一評論其餘概不旁及一是編但載一方一論與原書對看自明其主治與註釋一概不錄以歸簡便一學醫而不讀靈素則不明經絡無以知致病之由不讀傷寒金匱則無以知立方之法而無從施治不讀金元四大家則無以通補瀉溫涼之用而不知變化集解所選之方原以仲景及四家為宗其餘所收者不過張王許錢嚴陶數人而已本未嘗博採群書也然於此而得其醇化其偏觸類引伸亦可以無大過有志之士欲求更上一層則自有由博返約之法在一雄以駑駘下質何敢以管窺之見妄議古人然欲為初學折衷一是則僭妄之罪所不敢辭
  hash: sha256:d8961b307106bedaf37e6fa38f60fe10a9046bd32c2bab979c88477fcb212e45
